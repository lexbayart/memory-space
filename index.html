// 🪲 Идентификаторы целей, у которых spring-анимация уже завершилась.
// Позволяет renderGoals() не проигрывать spring повторно при пересоздании обёрток.
if(!window._goalsSpringDone) window._goalsSpringDone = new Set();

function renderGoals(){
  // Goal-ноды — HTML div'ы в #scene, как doc-wrap шарики.
  // Это даёт правильный z-index (зависящий от расстояния), а не фиксированный z-index SVG.

  var sceneEl = document.getElementById('scene');
  if(!sceneEl) return;

  // Удаляем старые HTML goal-ноды
  // 🪲🪲 Отменяем orphan springIn RAF до удаления элементов — предотвращаем утечку
  if(window._triGoalNodes){
    window._triGoalNodes.forEach(function(gn){
      if(gn._springRaf){ cancelAnimationFrame(gn._springRaf); gn._springRaf = null; }
    });
  }
  sceneEl.querySelectorAll('.goal-wrap').forEach(function(el){ el.parentNode.removeChild(el); });
  window._triGoalNodes = [];
  // 🪲🪲 _wrapsCache содержит только .doc-wrap — пересоздаём чтобы убрать устаревшие ссылки
  if(typeof _wrapsCache !== 'undefined') _wrapsCache = Array.from(scene.querySelectorAll('.doc-wrap'));
  // 🪲 Очищаем scale-анимации — ссылаются на удалённые DOM-элементы
  if(typeof _goalScaleAnims !== 'undefined') _goalScaleAnims = [];
  if(hoveredGoal){ hoveredGoal = null; updateZone(); } // 🪲
  // 🪲 Если карточка цели открыта — закрываем её, чтобы не висела поверх пересозданных узлов
  if(_activeGoalId !== null){ window.closeCard(); }

  var marks = window._triMarks;
  if(!marks) return;

  // Инжектим keyframe если ещё нет
  if(!document.getElementById('goal-node-kf')){
    var kf = document.createElement('style');
    kf.id = 'goal-node-kf';
    kf.textContent = [
      '@keyframes goalNodeRing{0%,100%{opacity:.7;transform:rotate(45deg) scale(.82)}50%{opacity:.15;transform:rotate(45deg) scale(1.25)}}',
      '@keyframes goalWrap{0%,100%{filter:drop-shadow(0 0 4px rgba(255,215,0,.5))}50%{filter:drop-shadow(0 0 10px rgba(255,215,0,.9))}}'
    ].join('');
    document.head.appendChild(kf);
  }

  _goals.forEach(function(goal){

    wrap._inner    = inner;
    wrap._springActive = true;
    wrap._currentScale = 0;

    // Начальная позиция 🪲
    var _initVis  = goal.days - offset;
    var _initSign = _initVis >= 0 ? 1 : -1;
    var _initTPos = daysToTPos(Math.abs(_initVis));
    wrap._svgX = _initSign * _initTPos * 280;

      w.addEventListener('mouseenter', function(){

        if(hoveredDoc){
          var _pn = pool[hoveredDoc.id] && (pool[hoveredDoc.id]._node || pool[hoveredDoc.id].querySelector('.node'));
          if(_pn) _pn.classList.remove('hovered');

        _animGoalScale(w, GOAL_HOVER_SCALE, 200); // 🪲 запускаем scale-анимацию ромба
        if(window._triMaskLayers && window._updateTriLineMasks){ // 🪲
          if(!window._triMaskRaf) window._triMaskRaf = requestAnimationFrame(function(){ window._triMaskRaf = null; if(window._updateTriLineMasks) window._updateTriLineMasks(); });
        }
      });
      w.addEventListener('mouseleave', function(){
        if(hoveredGoal === g) { hoveredGoal = null; updateZone(); } // 🪲 проверяем принадлежность — быстрый переход между ромбами иначе обнуляет hoveredGoal нового ромба
        w._hovered = false;
        w._inner.style.boxShadow = '0 0 10px rgba(255,215,0,.5)';
        _animGoalScale(w, 1, 200); // 🪲 возвращаем scale к 1
      });
    })(goal, wrap);

    // Spring-анимация появления — аналог springIn у SVG, но через inline-transform на _inner
    // 🪲 Пропускаем spring для целей, которые уже отображались — предотвращает повторную анимацию при renderGoals().
    var alreadyShown = window._goalsSpringDone.has(goal.id);
    if(alreadyShown){
      wrap._springActive = false;
      wrap._currentScale = 1;
      inner.style.transform = 'translate(-50%,-50%) rotate(45deg) scale(1)';
    } else {
      var start = performance.now();
      var dur = 500;
      (function(w, gid){
        function springIn(now){
          var p = Math.min((now - start) / dur, 1);
          var e = p < 0.6 ? (p/0.6)*1.25 : 1.25 - (p-0.6)/0.4*0.25;
          w._currentScale = e;

          w._inner.style.transform = 'translate(-50%,-50%) rotate(45deg) scale('+e.toFixed(3)+')';
          if(p < 1){ w._springRaf = requestAnimationFrame(springIn); } // 🪲🪲 сохраняем ID для отмены
          else {
            w._springRaf = null; // 🪲🪲
            w._springActive = false; w._currentScale = 1;
            w._inner.style.transform = 'translate(-50%,-50%) rotate(45deg) scale(1)';
            window._goalsSpringDone.add(gid); // 🪲
          }
        }
        w._springRaf = requestAnimationFrame(springIn); // 🪲🪲 сохраняем ID
      })(wrap, goal.id);
    }
  });

  // Инвалидируем кэш маски
  if(window._triMaskLayers && window._updateTriLineMasks){
    window._triLastObjects = null;
    requestAnimationFrame(function(){
      if(window._updateTriLineMasks) window._updateTriLineMasks();
    });
  }

// ── Timeline math (power scale, ±35 years fits edge-to-edge) ─────────────────
// Scale: barPct = 50 + sign * 50 * (|days| / MAX_DAYS)^EXPO
// EXPO=0.45 → nearby years spread out comfortably, distant years compress to edges.
// ±35 years = exactly ±50% = left/right edge.
var TL_MAX_YEARS = 36;  // 2026-36=1990 (past edge), 2026+36=2062 (future edge)
var TL_EXPO      = 0.45;
// Edges are set 8 months BEYOND the first/last year so 1990 and 2062
// land visibly inside the bar rather than getting clipped.
var _tlPastEdge  = new Date(Date.UTC(PRESENT.getUTCFullYear() - TL_MAX_YEARS - 1, 4, 1));
var _tlFutEdge   = new Date(Date.UTC(PRESENT.getUTCFullYear() + TL_MAX_YEARS + 1, 7, 1));
var TL_MAX_DAYS  = Math.max(
  (PRESENT - _tlPastEdge) / DAY_MS,
  (_tlFutEdge - PRESENT)  / DAY_MS
);

function offsetToPct(days){
  if(days === 0) return 50;
  var sign = days > 0 ? 1 : -1;
  var ratio = Math.min(Math.abs(days) / TL_MAX_DAYS, 1);
  return 50 + sign * 50 * Math.pow(ratio, TL_EXPO);
}

function pctToOffset(pct){
  if(pct === 50) return 0;
  var sign = pct > 50 ? 1 : -1;
  var ratio = Math.abs(pct - 50) / 50;
  return sign * TL_MAX_DAYS * Math.pow(ratio, 1 / TL_EXPO);
}

function animateToOffset(target){
  if(timeFrozen) return;
  if(animFr) cancelAnimationFrame(animFr);
  var start = offset, t0 = performance.now();
  var dur = Math.min(1600, 400 + Math.abs(target - start) * 0.5);
  function tick(now){
    if(timeFrozen){ animFr = null; moving = false; render(); return; } // 🪲🪲
    var t = Math.min((now - t0) / dur, 1);
    var eased = 1 - Math.pow(1 - t, 3);
    offset = start + (target - start) * eased;
    moving = true; render();
    if(t < 1){ animFr = requestAnimationFrame(tick); }
    else { animFr = null; offset = target; moving = false; render(); } // 🪲
  }
  animFr = requestAnimationFrame(tick);
}

var tlLabels = document.getElementById('tl-labels');
// ── Year positions map (for future event assignments on the timeline) ─────────
// Structure: { year: barPct }  e.g. { 2026: 50.0, 2027: 54.2, ... }
var TIMELINE_YEARS = {};

function renderTimeline(){
  tlLabels.innerHTML = '';
  TIMELINE_YEARS = {};
  var sysNow = PRESENT;
  var sysYear = sysNow.getUTCFullYear();
  var todayMs = sysNow.getTime();

  for(var y = sysYear - TL_MAX_YEARS; y <= sysYear + TL_MAX_YEARS; y++){
    var yearMs = Date.UTC(y, 0, 1);
    var daysFromToday = (yearMs - todayMs) / DAY_MS;
    var barPct = offsetToPct(daysFromToday);
    if(barPct < 0.4 || barPct > 99.6) continue;

    // Save position for future use
    TIMELINE_YEARS[y] = barPct;

    var isCurrentYear = (y === sysYear);
    var isPast = daysFromToday < 0; // Jan 1 of year y is before PRESENT

    // Tick
    var tick = document.createElement('div');
    tick.className = 'tl-tick';
    tick.style.left = barPct.toFixed(2) + '%';
    tick.dataset.days = String(daysFromToday);
    var _ltTick = document.body.classList.contains('light');
    var tickBase = isPast
      ? (_ltTick ? 'rgba(0,112,187' : 'rgba(0,229,255')
      : (_ltTick ? 'rgba(130,60,200' : 'rgba(198,120,221');
    tick.dataset.baseRgba = tickBase;
    tick.style.background = tickBase + ',.28)';

    // Широкая невидимая зона клика (только cursor:pointer и hover-эффект)
    // ВАЖНО: клик обрабатывается делегированным обработчиком на #tl-labels,
    // а не здесь — чтобы избежать перехвата кликов перекрывающимися зонами дальних годов.
    var hit = document.createElement('div');
    hit.className = 'tl-hit';
    hit.style.left = barPct.toFixed(2) + '%';
    tlLabels.appendChild(hit);

    // Label — hidden until hover on tick
    var lbl = document.createElement('div');
    lbl.className = 'tl-label';
    lbl.style.left = barPct.toFixed(2) + '%';
    var _ltLabel = document.body.classList.contains('light');
    lbl.style.color = isPast
      ? (_ltLabel ? 'rgba(0,100,200,.85)' : 'rgba(0,229,255,.8)')
      : (_ltLabel ? 'rgba(130,60,200,.85)' : 'rgba(198,120,221,.8)');
    lbl.textContent = String(y);

    tlLabels.appendChild(tick);
    tlLabels.appendChild(lbl);
  }

  // Build pairs array with pixel positions
  var allTicks = tlLabels.querySelectorAll('.tl-tick');
  var allLabels = tlLabels.querySelectorAll('.tl-label');
  tlLabels._tickPairs = [];
  for(var i=0;i<allTicks.length;i++){
    tlLabels._tickPairs.push({
      tick: allTicks[i],
      lbl:  allLabels[i],
      pct:  parseFloat(allTicks[i].style.left),
      cachedTx: null // 🪲 кэш пиксельного X — заполняется в _cacheTickPositions
    });
  }
  // Кэшируем пиксельные X после следующего layout (позиции доступны после рендера)
  requestAnimationFrame(function(){ _cacheTickPositions(); });
  // Assign dynamic hit zones: half-distance to each neighbour (in % units)
  var pairs = tlLabels._tickPairs;
  for(var i=0;i<pairs.length;i++){
    var prev = i > 0              ? pairs[i-1].pct : 0;
    var next = i < pairs.length-1 ? pairs[i+1].pct : 100;
    pairs[i].hitL = (pairs[i].pct + prev) / 2;
    pairs[i].hitR = (pairs[i].pct + next) / 2;
    var halfW = Math.max(2, Math.min(18, (pairs[i].hitR - pairs[i].hitL) * 3));
    pairs[i].tick.style.setProperty('--hw', halfW + 'px');
  }
}

function distLabel(daysAbs, isPastDir){
  var d = Math.round(daysAbs);
  if(d <= 1) return null; // null = показать часы
  var y = Math.floor(d/365), m = Math.floor((d%365)/30), dd = d%30;
  var parts = [];
  if(y) parts.push(y+'г');
  if(m) parts.push(m+'м');
  if(dd && !y) parts.push(dd+'д');
  return (isPastDir ? '← ' : '→ ') + parts.join(' ');
}

function nowTimeStr(){
  var n = new Date();
  var h = String(n.getHours()).padStart(2,'0');
  var mi = String(n.getMinutes()).padStart(2,'0');
  return h+':'+mi;
}

var _clockInterval = null;
function setDistText(label){
  if(label === null){
    zDist.textContent = nowTimeStr();
    if(!_clockInterval && !timeFrozen){ // 🪲 не запускаем интервал если время заморожено
      _clockInterval = setInterval(function(){
        if(Math.abs(offset) <= 1 && !hoveredDoc && !hoveredGoal && !timeFrozen){ // 🪲🪲
          zDist.textContent = nowTimeStr();
        } else {
          clearInterval(_clockInterval);
          _clockInterval = null;
        }
      }, 30000);
    }
  } else {
    if(_clockInterval){ clearInterval(_clockInterval); _clockInterval = null; }
    zDist.textContent = label;
  }
}

function setSearchDisplay(text, color){
  // Если пользователь сейчас набирает — не трогаем поле
  if(document.activeElement === searchInput) return;
  var _defColor = _isLightTheme ? '#1a2a3f' : '#b8ffe0';
  var hasTags = window._activeTags && window._activeTags.size > 0; // 🪲
  if(text){
    // Hover на шарик: раскрываем строку и показываем название
    searchInput.value = text;
    searchPill.classList.add('expanded');
    searchInput.style.color = color || _defColor;
    searchPill.style.borderColor = color ? color+'88' : '';
    searchPill.style.boxShadow = color ? '0 0 16px '+color+'44' : '';
  } else {
    // Уход с шарика: возвращаем к нейтральному виду
    searchInput.value = searchQuery || '';
    // Не схлопываем если есть активные теги или текстовый запрос
    if(!searchQuery && !hasTags) searchPill.classList.remove('expanded');
    searchInput.style.color = _defColor;
    // Сбрасываем inline border/shadow всегда — при активных тегах CSS-класс .active управляет стилем
    // 🪲 style.borderColor от hover-шарика перекрывал CSS .active, оставаясь после ухода курсора
    searchPill.style.borderColor = '';
    searchPill.style.boxShadow = '';
  }
  syncZoneState();
}

function updateZone(){
  if(hoveredGoal){
    var absDays = Math.abs(hoveredGoal.days);
    var isPastGoal = hoveredGoal.days < 0;
    // Время цели = СЕЙЧАС (реальное) + смещение цели в мс
    var nowMs = PRESENT.getTime(); // 🪲 база отсчёта — полночь UTC (как у goal.days), не Date.now()
    var goalDate = new Date(nowMs + hoveredGoal.days * DAY_MS);
    var dd = String(goalDate.getUTCDate()).padStart(2,'0'); // 🪲 UTC как в hoveredDoc
    var mm = String(goalDate.getUTCMonth()+1).padStart(2,'0');
    var yyyy = goalDate.getUTCFullYear();
    var wd = goalDate.toLocaleDateString('ru-RU',{weekday:'short',timeZone:'UTC'}).replace('.','');
    var hh = String(goalDate.getUTCHours()).padStart(2,'0');
    var mi = String(goalDate.getUTCMinutes()).padStart(2,'0');
    var gc = '#FFD700';
    setSearchDisplay('⭐ ' + (isPastGoal ? '−' : '+') + hoveredGoal.label + ' · ' + (isPastGoal ? 'прошлое' : 'будущее'), gc);
    zDate.classList.remove('is-present');
    zDist.classList.remove('is-present');
    zDate.textContent = dd+'.'+mm+'.'+yyyy+', '+wd;
    zDate.style.color = gc+'cc';
    zDate.style.textShadow = '0 0 18px '+gc+'66';
    if(_clockInterval){ clearInterval(_clockInterval); _clockInterval = null; }
    if(absDays < 1){
      zDist.textContent = (isPastGoal ? '← ' : '→ ') + nowTimeStr(); // 🪲 goalDate строится из UTC-полночи — getUTCHours() всегда 0; показываем реальное местное время
    } else {
      var label = distLabel(absDays, isPastGoal);
      zDist.textContent = label !== null ? label : nowTimeStr(); // 🪲 аналогично — fallback тоже через nowTimeStr()
    }
    zDist.style.color = gc+'88';
  } else if(hoveredDoc){
    var dDate = new Date(hoveredDoc.date+'T00:00:00Z');
    var dd = String(dDate.getUTCDate()).padStart(2,'0');
    var mm = String(dDate.getUTCMonth()+1).padStart(2,'0');
    var yyyy = dDate.getUTCFullYear();
    var wd = dDate.toLocaleDateString('ru-RU',{weekday:'short',timeZone:'UTC'}).replace('.','');
    var diffDays = (dDate - PRESENT) / DAY_MS;
    var isPastDoc = diffDays < 0; // 🪲 было < -1, пропускало заметки «вчера»
    var zc = hoveredDoc.color;
    // Название заметки в строке поиска
    setSearchDisplay(hoveredDoc.title, zc);
    // Дата
    zDate.classList.remove('is-present');
    zDist.classList.remove('is-present');
    zDate.textContent = dd+'.'+mm+'.'+yyyy+', '+wd;
    zDate.style.color = zc+'cc';
    zDate.style.textShadow = '0 0 18px '+zc+'66';
    // Расстояние от настоящего
    if(_clockInterval){ clearInterval(_clockInterval); _clockInterval = null; } // 🪲
    var _docDistLabel = distLabel(Math.abs(diffDays), isPastDoc);
    zDist.textContent = _docDistLabel !== null ? _docDistLabel : (isPastDoc ? '← ' : '→ ') + nowTimeStr(); // 🪲🪲 null = показать часы, а не '0д'
    zDist.style.color = zc+'88';
  } else {
    // Восстановить состояние таймлайна
    setSearchDisplay(null, null);
    var isPast=offset<-1,isFuture=offset>1;
    var isPresent=Math.abs(offset)<=1;
    var cur=new Date(PRESENT.getTime()+offset*DAY_MS);
    var dd=String(cur.getUTCDate()).padStart(2,'0');
    var mm=String(cur.getUTCMonth()+1).padStart(2,'0');
    var yyyy=cur.getUTCFullYear();
    var wd=cur.toLocaleDateString('ru-RU',{weekday:'short',timeZone:'UTC'}).replace('.','');
    zDate.textContent=dd+'.'+mm+'.'+yyyy+', '+wd;
    if(timeFrozen){
      var _lt = _isLightTheme;
      zDate.classList.remove('is-present');
      zDist.classList.remove('is-present');
      zDate.style.color=_lt ? 'rgba(10,30,70,.9)' : 'rgba(255,255,255,.9)';
      zDate.style.textShadow=_lt ? 'none' : '0 0 18px rgba(255,255,255,.5)';
      zDist.style.color=_lt ? 'rgba(10,30,70,.55)' : 'rgba(255,255,255,.55)';
    } else if(isPresent){
      zDate.classList.add('is-present');
      zDist.classList.add('is-present');
      zDate.style.color='';
      zDate.style.textShadow='';
      zDist.style.color='';
    } else {
      zDate.classList.remove('is-present');
      zDist.classList.remove('is-present');
      zDate.style.color='';
      zDate.style.textShadow='';
      zDist.style.color='';
    }
    if(timeFrozen){
      var _frozenLabel = distLabel(Math.abs(offset), offset < 0); // 🪲 isPast = offset<0, а не offset<-1 — иначе [-1..0] трактуется как будущее
      if(_frozenLabel !== null){
        setDistText(_frozenLabel); // показываем расстояние, интервал не нужен
      } else {
        // Замёрзли в настоящем — показываем время один раз, но НЕ запускаем интервал 🪲🪲
        if(_clockInterval){ clearInterval(_clockInterval); _clockInterval = null; }
        zDist.textContent = nowTimeStr();
      }
    } else {
      setDistText(distLabel(Math.abs(offset), isPast));
    }
  }
}

// ══════════════════════════════════════════════════════════════════════════
// ЯКОРНЫЕ ТОЧКИ ВРЕМЕНИ: сжатие времени
// ══════════════════════════════════════════════════════════════════════════
// Близкое время растянуто, дальнее сжато.
// Каждая точка: {days: количество дней, t: визуальная позиция на треугольнике}
var TIME_ANCHORS = [
  {days: 0,      t: 0},       // настоящее
  {days: 1/24,   t: 0.1395},  // 1 час
  {days: 0.5,    t: 0.3773},  // 1 день  (сдвинут вниз на ~20px)
  {days: 9,      t: 0.5581},  // 9 дней
  {days: 40,     t: 0.6977},  // 40 дней
  {days: 365,    t: 0.7908},  // 1 год
  {days: 1825,   t: 0.8606},  // 5 лет
  {days: 4380,   t: 0.9130},  // 12 лет
  {days: 13140,  t: 0.9523}   // 36 лет
];

// Позиционная шкала — только для railX/railY.
// Ближняя зона (0–40д) ИДЕНТИЧНА оригинальному TIME_ANCHORS.
// Между 40д и 365д добавлены промежуточные якоря чтобы дальние шарики
// имели больше пространства между собой и не выглядели слипшимися.
var POS_ANCHORS = [
  {days: 0,       t: 0},
  {days: 1/24,    t: 0.1395},
  {days: 0.5,     t: 0.3773},  // 1 день  (сдвинут вниз на ~20px)
  {days: 9,       t: 0.5581},
  {days: 40,      t: 0.6977},
  {days: 70,      t: 0.7210},
  {days: 120,     t: 0.7443},
  {days: 200,     t: 0.7676},
  {days: 365,     t: 0.7908},
  {days: 730,     t: 0.8257},
  {days: 1825,    t: 0.8606},
  {days: 4380,    t: 0.9130},
  {days: 13140,   t: 0.9523}
];

function daysToTPos(days) {
  var absDays = Math.abs(days);
  var last = POS_ANCHORS[POS_ANCHORS.length - 1];
  if (absDays >= last.days) {
    // Зажимаем на максимуме последнего якоря — не экстраполируем за пределы шкалы
    return last.t;
  }
  for (var i = 0; i < POS_ANCHORS.length - 1; i++) {
    var a1 = POS_ANCHORS[i], a2 = POS_ANCHORS[i + 1];
    if (absDays >= a1.days && absDays <= a2.days) {
      return a1.t + (absDays - a1.days) / (a2.days - a1.days) * (a2.t - a1.t);
    }
  }
  return 0;
}

// Функция преобразования: дни → визуальная позиция t
// Использует кусочно-линейную интерполяцию между якорными точками
function daysToT(days) {
  var absDays = Math.abs(days);
  var lastAnchor = TIME_ANCHORS[TIME_ANCHORS.length - 1];

  // За пределами максимального якоря — зажимаем на последнем значении
  if (absDays >= lastAnchor.days) {
    return lastAnchor.t;
  }

  // Найти два якоря, между которыми находится absDays
  for (var i = 0; i < TIME_ANCHORS.length - 1; i++) {
    var anchor1 = TIME_ANCHORS[i];
    var anchor2 = TIME_ANCHORS[i + 1];
    if (absDays >= anchor1.days && absDays <= anchor2.days) {
      var daysDiff = anchor2.days - anchor1.days;
      if (daysDiff === 0) return anchor1.t;
      var ratio = (absDays - anchor1.days) / daysDiff;
      return anchor1.t + ratio * (anchor2.t - anchor1.t);
    }
  }
  return 0;
}

function render(){
  var isPast=offset<-1,isFuture=offset>1; // 🪲 isAway удалён — переменная объявлялась но нигде не использовалась
  var zc=isPast?'#00e5ff':isFuture?'#c678dd':'#00ff9f';
  var _lt=_isLightTheme;

  // Обновляем верхнюю зону только если нет hover на шарике или цели
  if(!hoveredDoc && !hoveredGoal) updateZone();

  scene.className=moving?'moving':'';

  var pct=Math.max(0.4,Math.min(99.6,offsetToPct(offset)));
  if(barThumb){
    barThumb.style.left=pct.toFixed(2)+'%';
    var thumbColor;
    if(_lt){
      thumbColor = timeFrozen ? 'rgb(30,50,90)' : isPast ? 'rgb(0,112,187)' : isFuture ? 'rgb(130,60,200)' : 'rgb(0,170,110)';
    } else {
      thumbColor = timeFrozen ? 'rgba(255,255,255,.9)' : zc;
    }
    barThumb.style.background=thumbColor;
    barThumb.style.boxShadow=_lt ? 'none' : '0 0 12px '+thumbColor;
    if(_barNow){
      _barNow.style.background = timeFrozen ? (_lt ? 'rgba(10,30,70,.75)' : 'rgba(255,255,255,.8)') : (_lt ? '' : 'rgba(0,255,159,.7)'); // 🪲 в light-теме frozen = тёмный, не белый
      _barNow.style.boxShadow  = timeFrozen ? (_lt ? 'none' : '0 0 8px rgba(255,255,255,.7)') : '';
    }

    // DEBUG-панель (скрыта по умолчанию, клавиша K)
    if(_debugInfoEl && _debugMode && !moving){
      var pairs = tlLabels._tickPairs || [];
      var thumbPct = parseFloat(pct.toFixed(2));
      var closestTick = null;
      var minDist = Infinity;
      for(var _di=0;_di<pairs.length;_di++){
        var _dd=Math.abs(pairs[_di].pct - thumbPct);
        if(_dd < minDist){ minDist = _dd; closestTick = pairs[_di]; }
      }
      if(closestTick && minDist < 0.5){
        var yearText = closestTick.lbl.textContent;
        var thumbR  = barThumb.getBoundingClientRect();
        var tickR   = closestTick.tick.getBoundingClientRect();
        var thumbCX = thumbR.left + thumbR.width  * 0.5;
        var tickCX  = tickR.left  + tickR.width   * 0.5;
        var pxDelta = Math.abs(thumbCX - tickCX);
        var isExact = pxDelta < 1.0;
        _debugInfoEl.style.display = 'block';
        _debugInfoEl.style.color = isExact ? 'rgba(0,255,159,.9)' : 'rgba(255,200,0,.8)';
        _debugInfoEl.style.borderColor = isExact ? 'rgba(0,255,159,.5)' : 'rgba(255,200,0,.4)';
        _debugInfoEl.innerHTML = (isExact ? '✓ ' : '⚠ ') +
          'Шарик: ' + thumbPct.toFixed(2) + '% | ' +
          'Тик ' + yearText + ': ' + closestTick.pct.toFixed(2) + '% | ' +
          'Δpx: ' + pxDelta.toFixed(2) + 'px';
      } else {
        _debugInfoEl.style.display = 'none';
      }
    } else if(_debugInfoEl && !_debugMode){
      _debugInfoEl.style.display = 'none';
    }
  }

  arrL.style.opacity=isPast?.65:.14;
  arrR.style.opacity=isFuture?.65:.14;
  arrL.style.color = _lt ? '#0070bb' : '#00e5ff';
  arrR.style.color = _lt ? '#8833bb' : '#c678dd';

  npulse.className=moving?'show':'';
  pIcon.textContent=isPast?'🕰️':isFuture?'🔭':'◉';

  // ── Единый проход по DOCS: звёздочка + шарики + маски ─────────────────────
  var STAR_X = 0, STAR_Y = 180;
  var NODE_R = 27;
  var _minPxDist = Infinity;
  var _starAtIds = window._activeTagIds;
  var _mfut = [], _mpast = [];
  var _mSx = window._triSvgScaleX || 1; // читаем один раз на весь render
  var _activeTagIds = _starAtIds;
  var hasAnyFilter  = searchQuery || (_activeTagIds !== null);
  var _isClOut = window._isClusteredOut;

  DOCS.forEach(function(doc){
    var daysDiff = doc._daysDiff;
    var vis = daysDiff - offset;
    var abs = Math.abs(vis);
    var w = pool[doc.id];
    if(!w) return;

    if(abs > 13500){
      if(w._lastVis !== 'hidden'){ w._lastVis = 'hidden'; w.style.opacity = 0; w.style.visibility = 'hidden'; }
      return;
    }
    if(w._lastVis !== 'visible'){ w._lastVis = 'visible'; w.style.visibility = 'visible'; }

    var sign = vis >= 0 ? 1 : -1;
    var t    = daysToT(abs);
    var tPos = daysToTPos(abs);
    var sc   = Math.max(0.06, 1 - t * 0.94);
    var railX = sign * tPos * 280 * _mSx;
    var railY = -tPos * 485 + 180;

    // ── OPT: absDaysDiff кэшируем один раз — используется в opacity и isFarNow ──
    var absDaysDiff = daysDiff < 0 ? -daysDiff : daysDiff;

    // ── Кэшируем результат поиска — используется везде ниже 🪲
    var matchesSearch = !searchQuery || docMatchesSearch(doc);
    var matchesTag    = !_activeTagIds || _activeTagIds.has(doc.id);
    var passes        = matchesSearch && matchesTag;

    // ── OPT: _isClOut вызываем один раз — результат используется в 3 местах ───
    var _clusteredOut = _isClOut ? _isClOut(doc) : false;

    // ── Расстояние до звёздочки ──────────────────────────────────────────────
    var _skipStar = (_starAtIds && !_starAtIds.has(doc.id)) ||
                    (searchQuery && !matchesSearch) ||
                    (_clusteredOut && activeDocId !== doc.id && pinnedDocId !== doc.id);
    if(!_skipStar){
      var sdx = railX - STAR_X, sdy = railY - STAR_Y;
      var dist = Math.sqrt(sdx*sdx + sdy*sdy) - NODE_R * sc;
      if(dist < _minPxDist) _minPxDist = dist;
    }

    // ── Opacity / z-index ────────────────────────────────────────────────────
    var opacity;
    if(abs < 2){
      opacity = 1;
    } else if(absDaysDiff >= 1825){ // OPT: кэшированный absDaysDiff вместо повторного Math.abs
      opacity = Math.max(0.18, Math.pow(1 - t, 1.1) * 1.05);
    } else {
      opacity = Math.max(0.03, Math.pow(1 - t, 1.1) * 1.05);
    }
    var zIdx = Math.max(1, Math.round(500 - abs * 0.5));

    var isActiveDoc = (activeDocId === doc.id || pinnedDocId === doc.id);
    if(isActiveDoc){ opacity = 1; zIdx = 900; }

    var _baseOpacity = opacity; // 🪲 сохраняем до обнуления кластером — нужно для фильтрового усиления

    if(_clusteredOut && !isActiveDoc){ // OPT: кэшированный _clusteredOut
      opacity = 0;
      if(w._lastPE !== 'none'){ w._lastPE = 'none'; w.style.pointerEvents = 'none'; } // 🪲 кэш
    }

    if(hasAnyFilter && !isActiveDoc){
      if(passes){
        opacity = Math.min(_baseOpacity * 2.5, 1); // 🪲 усиляем базовую opacity, а не обнулённую кластером
        zIdx    = zIdx + 200;
        var _pe1 = _clusteredOut ? 'none' : ''; // 🪲 кластерованный шарик остаётся некликабельным даже при совпадении фильтра
        if(w._lastPE !== _pe1){ w._lastPE = _pe1; w.style.pointerEvents = _pe1; }
      } else {
        opacity = 0;
        zIdx    = Math.max(1, zIdx - 200);
        if(w._lastPE !== 'none'){ w._lastPE = 'none'; w.style.pointerEvents = 'none'; }
      }
    } else if(!isActiveDoc){
      var _pe2 = _clusteredOut ? 'none' : ''; // 🪲 не восстанавливаем pointerEvents для кластерованных
      if(w._lastPE !== _pe2){ w._lastPE = _pe2; w.style.pointerEvents = _pe2; }
    } else {
      if(w._lastPE !== ''){ w._lastPE = ''; w.style.pointerEvents = ''; }
    }
    // 🪲 htag-dim/htag-highlight никогда не добавляются (старая CSS-система удалена) —
    // проверки убраны из горячего пути render() как мёртвый код.

    // OPT: пишем opacity только при изменении — избегаем reflow каждый кадр
    var _opStr = opacity.toFixed ? opacity.toFixed(3) : String(opacity);
    if(w._lastOpacity !== _opStr){
      w._lastOpacity = _opStr;
      w.style.opacity = _opStr;
    }
    // OPT: пишем zIndex только при изменении
    var _zStr = String(zIdx);
    if(w._lastZIndex !== _zStr){
      w._lastZIndex = _zStr;
      w.style.zIndex = _zStr;
    }

    var _isDragged = _ghostState && _ghostState.wrap === w;
    if(!_isDragged){
      var newTransform =
        'translateX(calc(-50% + ' + railX.toFixed(1) + 'px)) ' +
        'translateY(calc(-50% + ' + railY.toFixed(1) + 'px)) ' +
        'scale(' + sc.toFixed(4) + ')';
      // Пишем transform только если значение изменилось — избегаем лишних reflow
      if(w._lastTransform !== newTransform){
        w._lastTransform = newTransform;
        w.style.transform = newTransform;
      }
      var newTransition = (moving || window._triAngleAnimRaf)
        ? 'opacity .12s'
        : w._animatingMove
          ? 'opacity .4s ease, transform 1s cubic-bezier(.22,.8,.3,1)'
          : 'opacity .4s ease, transform .5s cubic-bezier(.22,.8,.3,1)';
      if(w._lastTransition !== newTransition){
        w._lastTransition = newTransition;
        w.style.transition = newTransition;
      }
    }
    // cursor пишем только один раз при создании ноды — убираем из горячего пути
    // (он задаётся в nodeHTML, не нужно перезаписывать каждый кадр)

    // ── Маска ────────────────────────────────────────────────────────────────
    var _baseNodeR = 27 * sc;
    _maskBaseR[doc.id] = _baseNodeR;
    // 🪲 Обновляем _maskLiveR базовым радиусом ТОЛЬКО если нет анимации И нода не hovered —
    // иначе render() сбрасывал hover-радиус обратно к base сразу после завершения hover-анимации
    if(!_maskAnimTargets[doc.id] && hoveredDoc !== doc){
      _maskLiveR[doc.id] = _baseNodeR;
    }

    // ── Rebuild node HTML when necessary ─────────────────────────────────────
    // isActive идентично isActiveDoc выше — переиспользуем, не вычисляем повторно 🪲
    var isFarNow = absDaysDiff >= 1825; // OPT: кэшированный absDaysDiff
    if(w._lastActive !== isActiveDoc || w._lastLight !== _lt || w._lastFar !== isFarNow || w._lastColor !== doc.color || w._lastEmoji !== doc.emoji){ // 🪲 отслеживаем emoji
      w._lastActive = isActiveDoc;
      w._lastLight  = _lt;
      w._lastFar    = isFarNow;
      w._lastColor  = doc.color;
      w._lastEmoji  = doc.emoji; // 🪲
      w.innerHTML = nodeHTML(doc, isActiveDoc); // 🪲 используем isActiveDoc
      w._node = w.querySelector('.node');
    }

    // ── Маска: накапливаем для _updateTriLineMasks ────────────────────────────
    // OPT: используем уже вычисленные matchesSearch, matchesTag, _clusteredOut —
    // избегаем повторного docMatchesSearch (indexOf) и _isClOut(doc)
    if(window._triMaskLayers){
      if(matchesSearch && matchesTag && !(_clusteredOut && !isActiveDoc)){
        var r2 = (_maskLiveR && _maskLiveR[doc.id] !== undefined) ? _maskLiveR[doc.id] : 27 * sc;
        if(vis >= 0) _mfut.push({x:railX, y:railY, r:r2});
        else         _mpast.push({x:railX, y:railY, r:r2});
      }
    }
  });

  // ── Звёздочка ────────────────────────────────────────────────────────────────
  var SHRINK_START = NODE_R * 2;
  var starScale;
  if(_minPxDist <= 0){
    starScale = 0.15;
  } else if(_minPxDist >= SHRINK_START){
    starScale = 1;
  } else {
    starScale = 0.15 + 0.85 * (_minPxDist / SHRINK_START);
  }
  starDot.style.opacity = '1';
  starDot.style.setProperty('--star-scale', starScale.toFixed(3));

  // ── Пересчёт позиций goal-нодов при изменении offset ──────────────────────
  // Goal-ноды теперь HTML div'ы в #scene — позиционируются как doc-wrap шарики
  if(window._triGoalNodes && window._triGoalNodes.length){
    var _gSx = window._triSvgScaleX || 1;
    window._triGoalNodes.forEach(function(gn){
      if(gn._markDays == null) return;
      // _days: signed (fut = +markDays, past = -markDays)
      var vis   = gn._days - offset;
      var absVis = Math.abs(vis);
      var sign  = vis >= 0 ? 1 : -1;
      var t     = daysToT(absVis);
      var tPos  = daysToTPos(absVis);
      var sc    = Math.max(0.06, 1 - t * 0.94);
      var railX = sign * tPos * 280 * _gSx;
      var railY = -tPos * 485 + 180;

      gn._svgX = sign * tPos * 280;
      gn._svgY = railY;
      gn._distScale = sc; // сохраняем для fallback в _goalDiamondR

      // z-index как у шариков — дальняя цель уходит под ближние шарики
      var gnZ = Math.max(1, Math.round(500 - absVis * 0.5));
      // Прозрачность как у шариков
      var gnOp;
      if(absVis < 2){ gnOp = 1; }
      else { gnOp = Math.max(0.03, Math.pow(1 - t, 1.1) * 1.05); }

      gn.style.opacity    = gnOp.toFixed(3);
      gn.style.zIndex     = gnZ;
      gn.style.pointerEvents = gnOp < 0.05 ? 'none' : 'all';

      // Если spring ещё идёт — не перебиваем transform wrap, только обновляем координаты
      gn.style.transition = (moving || window._triAngleAnimRaf)
        ? 'opacity .12s'
        : 'opacity .4s ease, transform .5s cubic-bezier(.22,.8,.3,1)';
      // Позиция wrap обновляется всегда — и во время spring, и после него
      gn.style.transform =
        'translateX(calc(-50% + ' + railX.toFixed(1) + 'px)) ' +
        'translateY(calc(-50% + ' + railY.toFixed(1) + 'px))';
      // sc — масштаб удалённости применяем на _inner через CSS переменную
      if(gn._inner && !gn._springActive && !gn._goalScaleActive){ // 🪲 не перезаписываем hover scale
        gn._inner.style.transform = 'translate(-50%,-50%) rotate(45deg) scale('+sc.toFixed(4)+')';
      }
    });
  }

  // ── Маски линий: позиции уже накоплены в _mfut/_mpast выше в DOCS.forEach ───
  // OPT: второй проход DOCS удалён — все данные (matchesSearch, matchesTag,
  // _clusteredOut, railX, railY, sc) уже вычислены в первом проходе.
  if(window._triMaskLayers && window._updateTriLineMasks){
    // Добавляем цели: _svgX/_svgY обновлены выше в том же render()
    var _mgoalsFut = [], _mgoalsPast = [];
    if(window._triGoalNodes && window._triGoalNodes.length){
      window._triGoalNodes.forEach(function(gn){
        if(gn._svgX == null) return;
        if(parseFloat(gn.style.opacity || '1') < 0.05) return;
        var gr = 11 * (gn._distScale || 1) * (gn._currentScale || 1);
        var gobj = {x: gn._svgX * _mSx, y: gn._svgY, r: gr, shape: 'diamond'};
        if(gn._svgX >= 0) _mgoalsFut.push(gobj);
        else              _mgoalsPast.push(gobj);
      });
    }
    // Пишем только в свои слои — кластерный слой не трогаем
    window._triMaskLayers.nodes.fut  = _mfut;
    window._triMaskLayers.nodes.past = _mpast;
    window._triMaskLayers.goals.fut  = _mgoalsFut;
    window._triMaskLayers.goals.past = _mgoalsPast;
    window._updateTriLineMasks();
    // RAF: перечитываем BoundingClientRect после layout
    if(!window._maskRafPending){
      window._maskRafPending = true;
      requestAnimationFrame(function(){
        window._maskRafPending = false;
        if(!window._triMaskLayers || !window._updateTriLineMasks) return;
        var _mSxR = window._triSvgScaleX || 1;
        var _rfut = [], _rpast = [];
        DOCS.forEach(function(doc){
          if(!pool[doc.id] || pool[doc.id].style.visibility === 'hidden') return;
          if(parseFloat(pool[doc.id].style.opacity || '1') < 0.05) return;
          var _atR = window._activeTagIds;
          if(_atR && !_atR.has(doc.id)) return;
          if(searchQuery && !docMatchesSearch(doc)) return;
          var visR = doc._daysDiff - offset;
          var absR = Math.abs(visR);
          if(absR > 13500) return;
          var signR = visR >= 0 ? 1 : -1;
          var _wwR = pool[doc.id];
          var _ndR = _wwR && (_wwR._node || _wwR.querySelector('.node'));
          var mxR, myR, r2R;
          if(_ndR){
            var _nrR = _ndR.getBoundingClientRect();
            if(_nrR.width > 0){
              mxR = ((_nrR.left + _nrR.right) / 2 - window.innerWidth  / 2) / _mSxR;
              myR =  (_nrR.top  + _nrR.bottom) / 2 - window.innerHeight / 2;
              r2R = _nrR.width / 2;
              if(visR >= 0) _rfut.push({x:mxR, y:myR, r:r2R});
              else          _rpast.push({x:mxR, y:myR, r:r2R});
              return;
            }
          }
          var tPosR = daysToTPos(absR);
          var scR   = Math.max(0.06, 1 - daysToT(absR) * 0.94);
          mxR = signR * tPosR * 280 * _mSxR;
          myR = -tPosR * 485 + 180;
          r2R = (_maskLiveR && _maskLiveR[doc.id] !== undefined) ? _maskLiveR[doc.id] : 27 * scR;
          if(visR >= 0) _rfut.push({x:mxR, y:myR, r:r2R});
          else          _rpast.push({x:mxR, y:myR, r:r2R});
        });
        var _rgoalsFut = [], _rgoalsPast = [];
        if(window._triGoalNodes && window._triGoalNodes.length){
          window._triGoalNodes.forEach(function(gn){
            if(gn._svgX == null) return;
            if(parseFloat(gn.style.opacity || '1') < 0.05) return;
            var grR = _goalDiamondR(gn);
            var gobjR = {x: gn._svgX * _mSxR, y: gn._svgY, r: grR, shape: 'diamond'};
            if(gn._svgX >= 0) _rgoalsFut.push(gobjR);
            else              _rgoalsPast.push(gobjR);
          });
        }
        // Пишем только в свои слои — кластерный слой не трогаем
        window._triMaskLayers.nodes.fut  = _rfut;
        window._triMaskLayers.nodes.past = _rpast;
        window._triMaskLayers.goals.fut  = _rgoalsFut;
        window._triMaskLayers.goals.past = _rgoalsPast;
        window._updateTriLineMasks();
      });
    }
  }
  // Перерисовываем кластерные оболочки — вызываем напрямую (мы уже в RAF-контексте)
  if(window._drawClusters && !window._clDrawPending){
    window._clDrawPending = true;
    window._drawClusters();
    window._clDrawPending = false;
  }
}

var app=document.getElementById('app');

app.addEventListener('touchstart',function(e){
  if(e.touches.length===2){
    twoFingerActive=true;
    t2x=(e.touches[0].clientX+e.touches[1].clientX)/2;
    t2y=(e.touches[0].clientY+e.touches[1].clientY)/2;
    t2time=Date.now();
    e.preventDefault();
  } else {
    twoFingerActive=false;
  }
},{passive:false});

app.addEventListener('touchmove',function(e){
  e.preventDefault();

  if(e.touches.length!==2){
    if(twoFingerActive){
      twoFingerActive=false;
      clearTimeout(idleTimer);
      idleTimer=setTimeout(function(){moving=false;render();},200);
    }
    return;
  }

  var mx=(e.touches[0].clientX+e.touches[1].clientX)/2;
  var my=(e.touches[0].clientY+e.touches[1].clientY)/2;
  var now=Date.now();
  var dx=mx-t2x;
  var dt=now-t2time;
  t2x=mx; t2y=my; t2time=now;

  if(dt<=0||dt>150) return;
  if(Math.abs(dx)<0.5) return;

  if(timeFrozen) return;
  if(_isZoomMode) return; // 🪲
  if(animFr){ cancelAnimationFrame(animFr); animFr=null; } // 🪲 прерываем animateToOffset при touch-перетаскивании
  var dir=dx>0?1:-1;
  var spd=speedFn(offset);
  offset+=dir*Math.abs(dx)*spd*0.025;
  moving=true;
  render();
  clearTimeout(idleTimer);
  idleTimer=setTimeout(function(){moving=false;render();},230);
},{passive:false});

app.addEventListener('touchend',function(e){
  if(e.touches.length<2){
    twoFingerActive=false;
    clearTimeout(idleTimer);
    idleTimer=setTimeout(function(){moving=false;render();},230);
  }
},{passive:true});

app.addEventListener('touchcancel',function(){
  twoFingerActive=false;
  moving=false;
  render();
},{passive:true});

var _mdX=0,_mdY=0;
app.addEventListener('mousedown',function(e){lastX=e.clientX;lastY=e.clientY;lastT=Date.now();_mdX=e.clientX;_mdY=e.clientY;});

// ── BALL CLICK PRIORITY (capture phase) ───────────────────────────────────────
// Шарики имеют абсолютный приоритет кликов над ЛЮБЫМИ оверлеями (#tl-labels,
// #card-panel и т.д.). Capture-фаза на #app срабатывает ДО любого bubble-
// обработчика на дочерних элементах, поэтому ни одна «плашка» не перехватит клик.
app.addEventListener('click', function(e){
  // Игнорировать драг
  var dx = e.clientX - _mdX, dy = e.clientY - _mdY;
  if(Math.sqrt(dx*dx + dy*dy) > 8) return;

  // Игнорировать клики внутри card-box (кнопки сохранить, закрыть, редактировать и т.д.)
  // иначе capture-фаза перехватывает клик на «💾 сохранить» и открывает глобус
  var cardBoxEl = document.getElementById('card-box');
  if(cardBoxEl && cardBoxEl.contains(e.target)) return;

  // Если активен ghost-drag — клик подтверждает позицию ghost (но не если по card-box)
  if(_ghostState) return;

  // Найти шарик с наибольшим z-index (ближайший к центру) в точке клика
  var bestWrap = null;
  var bestZ    = -1;
  var wraps    = (typeof _wrapsCache !== 'undefined') ? _wrapsCache : scene.querySelectorAll('.doc-wrap');
  for(var i = 0; i < wraps.length; i++){
    var w = wraps[i];
    if(w.style.visibility === 'hidden' || parseFloat(w.style.opacity !== '' ? w.style.opacity : '1') < 0.05) continue;
    var node = w._node || w.querySelector('.node');
    if(!node) continue;
    var nr = node.getBoundingClientRect();
    if(e.clientX >= nr.left && e.clientX <= nr.right &&
       e.clientY >= nr.top  && e.clientY <= nr.bottom){
      var z = parseInt(w.style.zIndex) || 0;
      if(z > bestZ){ bestZ = z; bestWrap = w; }
    }
  }

  if(bestWrap){
    var doc = bestWrap._docRef || DOCS.find(function(d){ return d.id === bestWrap._docId; });
    if(doc){
      if(activeDocId === doc.id){
        // Повторный клик на открытую заметку — закрываем карточку,
        // но заметка остаётся «закреплённой» (яркой с линиями)
        closeCard();
      } else {
        openCard(doc);
      }
      e.stopPropagation();
      return;
    }
  }

  // Цели: аналогичный приоритет — поверх card-panel и любых оверлеев
  var hitGoal = goalAtPoint(e.clientX, e.clientY);
  if(hitGoal){
    if(_activeGoalId === hitGoal.id){ closeCard(); } else { openGoalCard(hitGoal); }
    e.stopPropagation();
    return;
  }

  // Клик в пустое место — снимаем закрепление и убираем линии
  if(pinnedDocId){
    pinnedDocId = null;
    clearLinkLines();
    if(typeof render === 'function') render();
    // 🪲 throttle — та же проблема двойного кадра
    if(window._drawClusters && !window._clDrawPending){ window._clDrawPending = true; requestAnimationFrame(function(){ window._clDrawPending = false; window._drawClusters(); }); }
  }
}, true); // true = capture phase — запускается первым, до всех bubble-обработчиков

app.addEventListener('mousemove',function(e){
  if(!(e.buttons&1))return;
  var now=Date.now();
  var dx=e.clientX-lastX,dy=e.clientY-lastY,dt=now-lastT;
  lastX=e.clientX;lastY=e.clientY;lastT=now;
  if(dt>120||dt<=0)return;
  var absDx=Math.abs(dx),absDy=Math.abs(dy);
  if(Math.sqrt(dx*dx+dy*dy)<1.5)return;
  var diag=absDy>absDx*0.27&&absDy<absDx*3.7;
  var horiz=absDx>absDy*1.5;
  if(!diag&&!horiz)return;
  if(timeFrozen) return;
  if(_isZoomMode) return; // 🪲
  if(animFr){ cancelAnimationFrame(animFr); animFr=null; } // 🪲 прерываем animateToOffset при ручном перетаскивании — иначе tick() перезапишет offset
  var dir=dx>0?1:-1;
  var boost=diag?1.65:1;
  offset+=dir*absDx*speedFn(offset)*boost*0.016;
  moving=true;
  render();
  clearTimeout(idleTimer);
  idleTimer=setTimeout(function(){moving=false;render();},210);
});

// wheelAccum удалена — накопления не было: сброс в 0 происходил в том же обработчике 🪲🪲
var wheelTimer=null;
app.addEventListener('wheel',function(e){
  e.preventDefault();

  var dx=e.deltaX;
  var dy=e.deltaY;

  if(e.deltaMode===1){dx*=20;dy*=20;}
  if(e.deltaMode===2){dx*=200;dy*=200;}

  var absDx=Math.abs(dx), absDy=Math.abs(dy);
  if(absDy>absDx*3) return;

  if(timeFrozen){ return; } // 🪲🪲 wheelAccum удалён из hot-path
  if(_isZoomMode){ return; } // 🪲🪲
  if(animFr){ cancelAnimationFrame(animFr); animFr=null; } // 🪲 прерываем animateToOffset — иначе tick() перезапишет offset на след. кадре
  var step=dx*speedFn(offset)*0.008; // 🪲 wheelAccum сбрасывался в том же кадре — накопления не было; считаем step напрямую из dx
  offset+=step;

  moving=true;
  render();

  clearTimeout(wheelTimer);
  wheelTimer=setTimeout(function(){moving=false;render();},180);
},{passive:false});

// Proximity scale для звёздочки
var _star = document.getElementById('star-dot');
var _starScale = 1;
var _starScaleTarget = 1;
var _starRaf = null;
var STAR_RADIUS = 65;
var STAR_BASE = 0.85; // совпадает с idle-анимацией
var STAR_MAX = 1.9;

function animStarScale(){
  _starScale += (_starScaleTarget - _starScale) * 0.12;
  var s = _starScale.toFixed(3);
  var glow = _starScale > STAR_BASE + 0.05;
  _star.style.animation = glow ? 'none' : '';
  if(glow){
    var t = (_starScale - STAR_BASE) / (STAR_MAX - STAR_BASE);
    _star.style.transform = 'translate(-50%,-50%) scale(' + s + ')';
    var _starClr = _isLightTheme ? 'rgba(255,120,30,' : 'rgba(0,229,255,';
    _star.style.filter = 'drop-shadow(0 0 ' + (4 + 14*t).toFixed(0) + 'px ' + _starClr + (0.5 + 0.5*t).toFixed(2) + '))';
  } else {
    _star.style.transform = '';
    _star.style.filter = '';
  }
  if(Math.abs(_starScale - _starScaleTarget) > 0.002){
    _starRaf = requestAnimationFrame(animStarScale);
  } else {
    _starScale = _starScaleTarget;
    _starRaf = null;
  }
}

// Один обход .doc-wrap вместо трёх отдельных обработчиков.
var _appEl2 = document.getElementById('app');

// Кэшированный массив wrap-элементов (не меняется после инициализации)
var _wrapsCache = Array.from(scene.querySelectorAll('.doc-wrap'));

// Кэши позиций статичных элементов (обновляются по resize)
// Внимание: _anchor НЕ кэшируется — он двигается вертикально через syncAnchor
var _starRect = null, _tlLabelsEl = document.getElementById('tl-labels');
var _tlLabelsW = 0;
function _updateStaticRects(){
  _starRect   = _star.getBoundingClientRect();
  _tlLabelsW  = _tlLabelsEl.getBoundingClientRect().width;
}
_updateStaticRects();
window.addEventListener('resize', _updateStaticRects);
window.addEventListener('resize', function(){ _anchorRect = null; if(typeof render === 'function') render(); }); // 🪲

_appEl2.addEventListener('mousemove', function(e){
  // -- 1. Определяем, над каким шариком курсор (один обход для всех нужд) --
  // 🪲 Синтетические события от SVG уже посчитали overNode — используем кэш
  var overNode;
  if(!e.isTrusted && window._lastOverNode !== undefined){
    overNode = window._lastOverNode;
  } else {
    overNode = false;
    var wraps = _wrapsCache;
    for(var i=0;i<wraps.length;i++){
      var w=wraps[i];
      if(w.style.visibility==='hidden'||parseFloat(w.style.opacity !== '' ? w.style.opacity : '1')<0.05) continue;
      var node=w._node || w.querySelector('.node');
      if(!node) continue;
      var nr=node.getBoundingClientRect();
      if(e.clientX>=nr.left&&e.clientX<=nr.right&&e.clientY>=nr.top&&e.clientY<=nr.bottom){
        overNode=true; break;
      }
    }
  }
  _appEl2.style.cursor = overNode ? 'pointer' : '';

  // -- 2. Proximity звёздочки --
  if(_star.style.opacity !== '0' && _star.style.opacity !== ''){
    if(overNode){
      _starScaleTarget = STAR_BASE;
      if(!_starRaf) _starRaf = requestAnimationFrame(animStarScale);
    } else {
      var _sr = _starRect || _star.getBoundingClientRect();
      var _scx = _sr.left + _sr.width / 2;
      var _scy = _sr.top + _sr.height / 2;
      var _sdist = Math.sqrt((e.clientX-_scx)*(e.clientX-_scx)+(e.clientY-_scy)*(e.clientY-_scy));
      var _st = Math.max(0, 1 - _sdist / STAR_RADIUS);
      _st = _st * _st * (3 - 2 * _st);
      _starScaleTarget = STAR_BASE + (STAR_MAX - STAR_BASE) * _st;
      if(!_starRaf) _starRaf = requestAnimationFrame(animStarScale);
    }
  }

  // -- 3. Proximity якоря + волна --
  if(!_anchorRect) _anchorRect = _anchor.getBoundingClientRect(); // 🪲 кэш — инвалидируется в syncAnchor/resize
  var _ar = _anchorRect;
  var _acx = _ar.left + _ar.width / 2;
  var _acy = _ar.top + _ar.height / 2;
  var _adist = Math.sqrt((e.clientX - _acx) * (e.clientX - _acx) + (e.clientY - _acy) * (e.clientY - _acy));
  var _at = Math.max(0, 1 - _adist / ANCHOR_RADIUS);
  _at = _at * _at * (3 - 2 * _at);
  _anchorScaleTarget = 1 + (ANCHOR_MAX_SCALE - 1) * _at;
  if(_adist < ANCHOR_RADIUS){
    _waveTarget = 1;
    _waveCurX = _tlLabelsW * 0.5;
    _waveFromAnchor = true; // 🪲🪲
    scheduleWave();
  } else if(_waveFromAnchor){ // 🪲🪲
    _waveFromAnchor = false;
    _waveTarget = 0;
    scheduleWave();
  }
  if(!_anchorRaf) _anchorRaf = requestAnimationFrame(animAnchorScale);
});

_appEl2.addEventListener('mouseleave', function(){
  _anchorScaleTarget = 1;
  if(!_anchorRaf) _anchorRaf = requestAnimationFrame(animAnchorScale);
  if(_waveTarget !== 0){ _waveTarget = 0; _waveFromAnchor = false; scheduleWave(); } // 🪲
});

// ── Делегированный обработчик клика на временной шкале ────────────────────────
// КОРНЕВАЯ ПРИЧИНА БАГА: у дальних годов зоны клика (.tl-hit, 32px) перекрываются.
// Все .tl-hit имеют одинаковый z-index:10, при перекрытии побеждает тот, кто
// позже в DOM (= более поздний год). Клик на 2043 перехватывается зоной 2044/2045
// → шарик уходит вправо от тика, на который реально кликнул пользователь.
//
// РЕШЕНИЕ: один обработчик на весь контейнер. По фактическим ПИКСЕЛЯМ через
// getBoundingClientRect() находим тик, чья позиция ближайшая к курсору.
// Процентные значения совпадают всегда — важен именно пиксельный выбор.
tlLabels.addEventListener('click', function(e) {
  var _wraps = (typeof _wrapsCache !== 'undefined') ? _wrapsCache : scene.querySelectorAll('.doc-wrap');
  for(var _wi=0;_wi<_wraps.length;_wi++){
    var _ww=_wraps[_wi];
    if(_ww.style.visibility==='hidden'||parseFloat(_ww.style.opacity !== '' ? _ww.style.opacity : '1')<0.05) continue; // 🪲
    var _nn=_ww._node || _ww.querySelector('.node');
    if(!_nn) continue;
    var _nr=_nn.getBoundingClientRect();
    if(e.clientX>=_nr.left&&e.clientX<=_nr.right&&e.clientY>=_nr.top&&e.clientY<=_nr.bottom){
      // Клик на шарик — передать ему и не обрабатывать таймлайн
      _ww.dispatchEvent(new MouseEvent('click',{bubbles:false,cancelable:true,clientX:e.clientX,clientY:e.clientY}));
      return;
    }
  }
  var pairs = tlLabels._tickPairs;
  if (!pairs || !pairs.length) return;

  var rect   = tlLabels.getBoundingClientRect();
  var clickX = e.clientX - rect.left;

  var bestPair = null;
  var bestDist = Infinity;

  pairs.forEach(function(p) {
    var tx = (p.cachedTx !== null) ? p.cachedTx : (function(){ var tr = p.tick.getBoundingClientRect(); return tr.left + tr.width * 0.5 - rect.left; })(); // 🪲 cachedTx вместо getBoundingClientRect
    var dist = Math.abs(clickX - tx);
    if (dist < bestDist) { bestDist = dist; bestPair = p; }
  });

  if (bestPair) {
    if(timeFrozen) return; // 🪲 замороженное время — навигация запрещена
    e.stopPropagation();
    animateToOffset(parseFloat(bestPair.tick.dataset.days));
  }
});

// ── Wave effect on timeline ───────────────────────────────────────────────────
var WAVE_MAX_H  = 18;  // px — peak tick height
var WAVE_MIN_H  = 4;   // px — resting tick height
var WAVE_SIGMA  = 55;  // px — gaussian spread (narrower = more elegant)
var _waveRaf    = null;
var _waveCurX   = -9999;
var _waveAmp    = 0;   // 0..1 — fade-in/out multiplier for smooth entry
var _waveTarget = 0;   // 0 = fading out, 1 = fading in
var WAVE_SPEED  = 0.07; // lerp speed per frame (~60fps → ~12 frames to full)
var _waveFromAnchor = false; // 🪲🪲 флаг: волна запущена от якоря, а не от тиков

function storeTickYear(){
  var pairs = tlLabels._tickPairs;
  if(!pairs) return;
  pairs.forEach(function(p){ p.tick.dataset.year = p.lbl.textContent; });
}
storeTickYear();

var _barNow     = document.getElementById('bar-now');
var _barNowLbl  = document.getElementById('bar-now-lbl');
var _barNowRestH = 12; // px — исходная высота #bar-now (растёт вверх от bottom:0)

// Заполнить подпись сегодняшней датой
(function(){
  var n = new Date();
  var dd = String(n.getUTCDate()).padStart(2,'0'); // 🪲
  var mm = String(n.getUTCMonth()+1).padStart(2,'0'); // 🪲
  var yyyy = n.getUTCFullYear(); // 🪲
  var wd = n.toLocaleDateString('ru-RU',{weekday:'short',timeZone:'UTC'}).replace('.',''); // 🪲
  _barNowLbl.textContent = dd+'.'+mm+'.'+yyyy+', '+wd;
})();

function _cacheTickPositions(){
  var pairs = tlLabels._tickPairs;
  if(!pairs || !pairs.length) return;
  var rect = tlLabels.getBoundingClientRect();
  if(rect.width < 2) return; // не готово
  tlLabels._cachedWidth = rect.width; // 🪲 кэшируем ширину — нужна для barNowX в applyWave
  for(var i = 0; i < pairs.length; i++){
    var tr = pairs[i].tick.getBoundingClientRect();
    pairs[i].cachedTx = tr.left + tr.width * 0.5 - rect.left;
  }
}
// Инвалидируем кэш тиков при ресайзе
window.addEventListener('resize', function(){ setTimeout(_cacheTickPositions, 120); }); // 🪲

function applyWave(){
  var pairs = tlLabels._tickPairs;
  if(!pairs) return;

  // Lerp amplitude toward target
  _waveAmp += (_waveTarget - _waveAmp) * WAVE_SPEED;
  var amp = _waveAmp;

  // 🪲 Используем кэшированную ширину tlLabels — getBoundingClientRect здесь вызывает reflow каждый кадр
  var tlW = tlLabels._cachedWidth || tlLabels.getBoundingClientRect().width;

  // Позиция #bar-now — строго по центру bar-track
  var barNowX  = tlW * 0.5;
  var distNow  = Math.abs(_waveCurX - barNowX);

  // Найти ближайший элемент к курсору: среди годовых тиков И #bar-now
  // 🪲 Используем cachedTx — getBoundingClientRect в цикле вызывает forced reflow каждый RAF-кадр
  var bestI = -1, bestDist = distNow; // изначально претендент — bar-now
  var barNowIsPeak = true;
  pairs.forEach(function(p, i){
    var tx = (p.cachedTx !== null) ? p.cachedTx : (p.tick.offsetLeft + p.tick.offsetWidth * 0.5); // 🪲 fallback без getBoundingClientRect
    var dist = Math.abs(_waveCurX - tx);
    if(dist < bestDist){ bestDist = dist; bestI = i; barNowIsPeak = false; }
  });

  // #bar-now участвует в волне
  if(_barNow){
    var gNow = Math.exp(-(distNow * distNow) / (2 * WAVE_SIGMA * WAVE_SIGMA)) * amp;
    var hNow = _barNowRestH + (WAVE_MAX_H - _barNowRestH) * gNow;
    _barNow.style.height    = hNow.toFixed(1) + 'px';
    if(typeof scheduleAnchorSync === 'function') scheduleAnchorSync(); // 🪲
    var _ltWave = _isLightTheme;
    if(!timeFrozen){
      _barNow.style.boxShadow = _ltWave ? 'none' : '0 0 ' + (8 + 14 * gNow).toFixed(0) + 'px rgba(0,255,159,' + (0.7 + 0.3 * gNow).toFixed(2) + ')';
    }
  }
  // Метка — только когда bar-now ближайший к курсору (пик), как у годовых тиков
  if(_barNowLbl) _barNowLbl.style.opacity = (barNowIsPeak && amp > 0.5) ? ((amp - 0.5) * 2).toFixed(2) : '0';

  pairs.forEach(function(p, i){
    var tx   = (p.cachedTx !== null) ? p.cachedTx : (p.tick.offsetLeft + p.tick.offsetWidth * 0.5); // 🪲🪲 rect не в scope applyWave — fallback через offsetLeft
    var dist = Math.abs(_waveCurX - tx);
    var g    = Math.exp(-(dist * dist) / (2 * WAVE_SIGMA * WAVE_SIGMA)) * amp;
    var h    = WAVE_MIN_H + (WAVE_MAX_H - WAVE_MIN_H) * g;
    var isPeak = (i === bestI);
    p.tick.style.height = h.toFixed(1) + 'px';
    var br = p.tick.dataset.baseRgba || 'rgba(255,255,255';
    if(isPeak && amp > 0.3){
      p.tick.style.background = br + ',' + amp.toFixed(2) + ')';
      p.tick.style.boxShadow  = '';
      p.tick.style.width      = '2px';
    } else {
      p.tick.style.background = br + ',' + (0.28 + 0.55 * g).toFixed(3) + ')';
      p.tick.style.boxShadow  = '';
      p.tick.style.width      = g > 0.05 ? '2px' : '1px';
    }
    p.lbl.style.opacity = (isPeak && amp > 0.5) ? ((amp - 0.5) * 2).toFixed(2) : '0';
  });

  // Keep animating if not settled
  var settled = Math.abs(_waveAmp - _waveTarget) < 0.005;
  if(!settled){
    _waveRaf = requestAnimationFrame(applyWave);
  } else {
    _waveAmp = _waveTarget;
    _waveRaf = null;
    if(_waveTarget === 0){
      pairs.forEach(function(p){
        var br = p.tick.dataset.baseRgba || 'rgba(255,255,255';
        p.tick.style.height     = WAVE_MIN_H + 'px';
        p.tick.style.background = br + ',.28)';
        p.tick.style.width      = '1px';
        p.tick.style.boxShadow  = '';
        p.lbl.style.opacity     = '0';
      });
      // Сброс #bar-now к исходному виду
      if(_barNow){
        _barNow.style.height    = _barNowRestH + 'px';
        if(typeof scheduleAnchorSync === 'function') scheduleAnchorSync(); // 🪲
        if(!timeFrozen){
          _barNow.style.boxShadow = _isLightTheme ? 'none' : '';
        }
      }
      if(_barNowLbl) _barNowLbl.style.opacity = '0';
    }
  }
}

function scheduleWave(){
  if(!_waveRaf) _waveRaf = requestAnimationFrame(applyWave);
}

// Forward pointer/touch events so dragging still works
['pointerdown','pointermove','pointerup','touchstart','touchmove','touchend'].forEach(function(ev){
  tlLabels.addEventListener(ev, function(e){
    var clone = new e.constructor(e.type, e);
    document.getElementById('app').dispatchEvent(clone);
  }, {passive:true});
});

tlLabels.addEventListener('mousemove', function(e){
  var rect = tlLabels.getBoundingClientRect();
  _waveCurX   = e.clientX - rect.left;

});

});

// ── Triangle tick marks ────────────────────────────────────────────────────────
// Засечки отходят от линии будущего вправо, от линии прошлого влево.
// Временные точки: 1 день, 9 дней, 40 дней, 1 год, 5 лет.
(function(){
  var svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('id','tri-ticks-svg');
  svg.style.cssText='position:fixed;inset:0;width:100%;height:100%;z-index:450;overflow:visible';

  // Пробрасываем drag/scroll с SVG на #app, чтобы не мешать навигации
  var _appEl = document.getElementById('app');
  ['mousedown','mousemove','mouseup','click','touchstart','touchmove','touchend','wheel'].forEach(function(ev){
    svg.addEventListener(ev, function(e){

      if(e.target && e.target.getAttribute && e.target.getAttribute('pointer-events')==='all') return;

  var _svgCX = window.innerWidth  / 2;
  var _svgCY = window.innerHeight / 2;

  svg.addEventListener('mousemove', function(e){
    var svgX = e.clientX - _svgCX;
    var svgY = e.clientY - _svgCY;

    var overNode = false;
    var wraps = (typeof _wrapsCache !== 'undefined') ? _wrapsCache : scene.querySelectorAll('.doc-wrap');

      var w = wraps[i];

    var t_at_cursor = (180 - svgY) / 485;
    var borderX     = t_at_cursor * 280;

    var insideTriangle = (t_at_cursor >= 0 && t_at_cursor <= 1 && Math.abs(svgX) < borderX);
    var inBottomZone   = (svgY >= 180);

    // Hashtag column zones — suppress anchors when cursor is over left/right tag strips
    var HTAG_STRIP_W = 170; // px from screen edge
    var inHtagZone = (_triMouseX < HTAG_STRIP_W || _triMouseX > window.innerWidth - HTAG_STRIP_W);

    // Выше верхнего края треугольника (t > 1) — тоже мёртвая зона,
    // иначе якоря мерцают когда курсор над поисковиком или верхней частью экрана
    var inTopZone      = (t_at_cursor > 1);
    var deadZone       = !_triMouseActive || insideTriangle || inBottomZone || inHtagZone || inTopZone;

    var cursorSide = (svgX >= 0) ? 'fut' : 'past';
    var stillAnimating = false;

    _triAnchors.forEach(function(a, i){
      // Вертикальное расстояние от курсора до якоря
      var screenRy = cy + a.svgRy;
      var dy = Math.abs(_triMouseY - screenRy);
      var inRange = (!deadZone && a.side === cursorSide && dy <= PROX_RANGE);

      var target;
      if(deadZone || a.side !== cursorSide){
        target = 0;
      } else {
        // В 100px по вертикали — полная яркость, иначе тусклый
        target = inRange ? 1.0 : DIM_OPACITY;
      }

      // Lerp opacity
      var cur = _triCurrentOp[i] || 0;
      var next = cur + (target - cur) * FADE_SPEED;
      if(Math.abs(next - target) < 0.005) next = target;
      _triCurrentOp[i] = next;
      a.group.style.opacity = next.toFixed(3);
      // pointer-events всегда включены — пусть даже при низкой opacity можно кликнуть
      a.group.style.pointerEvents = 'all';

      // font-size: динамический в зависимости от близости
      var fsTarget = inRange ? FS_BIG : FS_SMALL;
      var curFs = _triCurrentFs[i] !== undefined ? _triCurrentFs[i] : FS_SMALL;
      var nextFs = curFs + (fsTarget - curFs) * FADE_SPEED;
      if(Math.abs(nextFs - fsTarget) < 0.3) nextFs = fsTarget;
      _triCurrentFs[i] = nextFs;
      if(a.lblEl) a.lblEl.setAttribute('font-size', nextFs.toFixed(1));

      if(Math.abs(next - target) > 0.005 || Math.abs(nextFs - fsTarget) > 0.3) stillAnimating = true;
    });

    // Продолжаем RAF пока есть что анимировать
    if(stillAnimating){
      _triRaf = requestAnimationFrame(applyTriProximity);
    }
  }

  function scheduleTriProximity(){
    if(!_triRaf) _triRaf = requestAnimationFrame(applyTriProximity);
  }

  // Используем document, а не #app — чтобы не зависеть от порядка обработчиков
  // и не получать задвоенные события от SVG-проброса.
  // isTrusted=false означает синтетическое событие от dispatchEvent — игнорируем.
  document.addEventListener('mousemove', function(e){
    // Игнорируем только явно синтетические события
    if(e.isTrusted === false) return;
    _triMouseY      = e.clientY;
    _triMouseX      = e.clientX;
    _triMouseActive = true;
    scheduleTriProximity();
  });

  document.addEventListener('mouseleave', function(){
    _triMouseActive = false;
    scheduleTriProximity();
  });
})();

render();
