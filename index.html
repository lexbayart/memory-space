  ];

  function classifyTag(tag){
    var lower = tag.toLowerCase();
    for(var i = 0; i < INTERNAL_HINTS.length; i++){
      if(lower.indexOf(INTERNAL_HINTS[i].toLowerCase()) !== -1) return 'right';
    }
    for(var j = 0; j < EXTERNAL_HINTS.length; j++){
      if(lower.indexOf(EXTERNAL_HINTS[j].toLowerCase()) !== -1) return 'left';
    }
    return 'left';
  }

  var tagMap = {};
  DOCS.forEach(function(doc){
    (doc.tags||[]).forEach(function(t){
      if(!tagMap[t]) tagMap[t]={count:0,docIds:[],side:classifyTag(t)};
      tagMap[t].count++;
      tagMap[t].docIds.push(doc.id);
    });
  });

  var leftTags=[], rightTags=[];
  Object.keys(tagMap).forEach(function(t){
    if(tagMap[t].side==='left') leftTags.push(t); else rightTags.push(t);
  });
  leftTags.sort(function(a,b){return tagMap[b].count-tagMap[a].count;});
  rightTags.sort(function(a,b){return tagMap[b].count-tagMap[a].count;});

  var activeTags = new Map(); // tag -> side ('left'|'right')
  window._activeTags = activeTags; // 🪲 экспортируем для доступа снаружи IIFE

  function applyHashtagFilter(){
    // При активации/снятии хештег-фильтра — если форма создания цели не открыта,
    // сбрасываем анимацию угла треугольника, чтобы цели не двигались искажённо.
    if(!document.body.classList.contains('zoom-mode')){
      if(window._triAngleAnimRaf){ cancelAnimationFrame(window._triAngleAnimRaf); window._triAngleAnimRaf = null; }
      if(window._triSvgScaleX && window._triSvgScaleX !== 1){
        window._triSvgScaleX = 1;
        if(window._updateRibbonPoints) window._updateRibbonPoints(1);
      }
    }
    if(activeTags.size === 0){
      window._activeTagIds = null;
    } else {
      var matchIds = new Set();
      activeTags.forEach(function(side, tag){
        (tagMap[tag] && tagMap[tag].docIds || []).forEach(function(id){ matchIds.add(id); });
      });
      window._activeTagIds = matchIds;
    }
    // render() управляет opacity — классы htag-dim/htag-highlight больше не нужны
    if(typeof render === 'function') render();
  }

  var leftEl=document.getElementById('hashtags-left');
  var rightEl=document.getElementById('hashtags-right');

  function renderCol(container,tags,colSide){
    // 🪲 Сохраняем scroll-позицию перед пересозданием DOM
    var _prevInner = container.querySelector('.htag-inner');
    var _prevScroll = _prevInner ? _prevInner.scrollTop : 0;
    container.innerHTML='';

    // Label stays fixed above scroll area
    var lbl=document.createElement('div');
    lbl.className='col-label';
    lbl.textContent=colSide==='left'?'факторы':'внутреннее';
    container.appendChild(lbl);

    // Scrollable inner list
    var inner=document.createElement('div');
    inner.className='htag-inner';
    tags.forEach(function(tag){
      var btn=document.createElement('div');
      btn.className='htag';
      var display=tag.replace(/^#/,'');
      btn.textContent='#'+display;
      btn.dataset.tag=tag;
      btn.addEventListener('click',function(e){
        e.stopPropagation();
        if(activeTags.has(tag)){activeTags.delete(tag);btn.classList.remove('active');}
        else{activeTags.set(tag, colSide);btn.classList.add('active');}
        applyHashtagFilter(); // 🪲 уже вызывает render() внутри
        updateSearchTagsDisplay();
      });
      inner.appendChild(btn);
    });
    container.appendChild(inner);
    // 🪲 Восстанавливаем scroll-позицию
    if(_prevScroll > 0) inner.scrollTop = _prevScroll;
  }

  function attachScroll(col){
    var inner=col.querySelector('.htag-inner');
    if(!inner)return;

    function updateMask(){
      var scrollTop = inner.scrollTop;
      var maxScroll = inner.scrollHeight - inner.clientHeight;
      var atTop    = scrollTop < 8;
      var atBottom = maxScroll <= 0 || scrollTop >= maxScroll - 8;

      var topFade    = atTop    ? '0%'  : '10%';
      var bottomFade = atBottom ? '100%': '75%';

      var mask = 'linear-gradient(to bottom, transparent 0%, black '+topFade+', black '+bottomFade+', transparent 100%)';
      inner.style.webkitMaskImage = mask;
      inner.style.maskImage = mask;
    }

    updateMask();
    inner.addEventListener('scroll', updateMask);

    inner.addEventListener('wheel',function(e){
      e.stopPropagation();e.preventDefault();inner.scrollTop+=e.deltaY;
    },{passive:false});
    var _ty=0,_ts=0;
    inner.addEventListener('touchstart',function(e){
      if(e.touches.length===1){_ty=e.touches[0].clientY;_ts=inner.scrollTop;}
    },{passive:true});
    inner.addEventListener('touchmove',function(e){
      if(e.touches.length===1){e.stopPropagation();inner.scrollTop=_ts+(_ty-e.touches[0].clientY);}
    },{passive:false});

    if(!col._zoneListenerAttached){ // 🪲
      col._zoneListenerAttached = true;
      col.addEventListener('mouseenter',function(){ col.classList.add('zone-active'); });
      col.addEventListener('mouseleave',function(){ col.classList.remove('zone-active'); });
    }
  }

  renderCol(leftEl,leftTags,'left');   attachScroll(leftEl);
  renderCol(rightEl,rightTags,'right'); attachScroll(rightEl);

  // ── Edit-mode: intercept tag clicks to add/remove from card ─────────────
  function _handleTagClickInEditMode(e){
    if(!document.body.classList.contains('card-editing')) return;
    var btn = e.target.closest('.htag');
    if(!btn) return;
    var tag = btn.dataset.tag;
    if(!tag) return;
    e.stopPropagation();
    var docId = window._editingDocId;
    var doc = docId && DOCS.find(function(d){ return d.id === docId; });
    if(doc) window._addTagToEditCard(tag, doc);
  }
  leftEl.addEventListener('click',  _handleTagClickInEditMode, true);
  rightEl.addEventListener('click', _handleTagClickInEditMode, true);

  window.refreshHashtags=function(){
    Object.keys(tagMap).forEach(function(k){delete tagMap[k];});
    DOCS.forEach(function(doc){
      (doc.tags||[]).forEach(function(t){
        if(!tagMap[t])tagMap[t]={count:0,docIds:[],side:classifyTag(t)};
        tagMap[t].count++;tagMap[t].docIds.push(doc.id);
      });
    });
    leftTags.length=0;rightTags.length=0;
    Object.keys(tagMap).forEach(function(t){
      if(tagMap[t].side==='left')leftTags.push(t);else rightTags.push(t);
    });
    leftTags.sort(function(a,b){return tagMap[b].count-tagMap[a].count;});
    rightTags.sort(function(a,b){return tagMap[b].count-tagMap[a].count;});
    renderCol(leftEl,leftTags,'left');   attachScroll(leftEl);
    renderCol(rightEl,rightTags,'right'); attachScroll(rightEl);
    // 🪲🪲 Удаляем из activeTags теги, которых больше нет ни в одной заметке
    activeTags.forEach(function(side, tag){
      if(!tagMap[tag]) activeTags.delete(tag);
    });
    // 🪲 Восстанавливаем класс active на кнопках после пересоздания DOM
    activeTags.forEach(function(side, tag){
      var col = side === 'left' ? leftEl : rightEl;
      col.querySelectorAll('.htag').forEach(function(b){
        if(b.dataset.tag === tag) b.classList.add('active');
      });
    });
    applyHashtagFilter();
    // 🪲 Восстанавливаем on-card подсветку если открыт режим редактирования
    if(document.body.classList.contains('card-editing') && window._editingDocId){
      var _editDoc = DOCS.find(function(d){ return d.id === window._editingDocId; });
      if(_editDoc && typeof _syncEditTagHighlights === 'function') _syncEditTagHighlights(_editDoc);
    }
  };


  document.getElementById('app').addEventListener('click',function(e){
    if(activeTags.size===0)return;
    var target=e.target;
    if(target.classList.contains('htag'))return;
    if(leftEl.contains(target)||rightEl.contains(target))return;
    // Клик внутри поисковой строки — не сбрасываем
    var pill = document.getElementById('search-pill');
    if(pill.contains(target))return;
    // Клик внутри карточки заметки или цели — не сбрасываем хэштеги
    var cardPanel = document.getElementById('card-panel');
    if(cardPanel && cardPanel.contains(target))return;
    // Клик внутри goal overlay — не сбрасываем
    var goalOverlay = document.getElementById('goal-overlay');
    if(goalOverlay && goalOverlay.contains(target))return;
    activeTags.clear();
    leftEl.querySelectorAll('.htag.active').forEach(function(b){b.classList.remove('active');});
    rightEl.querySelectorAll('.htag.active').forEach(function(b){b.classList.remove('active');});
    applyHashtagFilter(); // 🪲 уже вызывает render() внутри
    updateSearchTagsDisplay();
  });

  // Двойной клик по полю ввода — сбросить все хэштеги, вернуть поисковик в исходный вид
  document.getElementById('search-input').addEventListener('dblclick', function(e){
    e.stopPropagation();
    if(activeTags.size === 0 && !searchQuery) return; // 🪲
    activeTags.clear();
    searchQuery = ''; // 🪲
    leftEl.querySelectorAll('.htag.active').forEach(function(b){b.classList.remove('active');});
    rightEl.querySelectorAll('.htag.active').forEach(function(b){b.classList.remove('active');});
    applyHashtagFilter(); // 🪲 уже вызывает render() внутри
    updateSearchTagsDisplay();
    // Полный сброс пилюли до исходного состояния (как при наведении без хэштегов)
    var pill = document.getElementById('search-pill');
    var inp  = document.getElementById('search-input');
    pill.classList.remove('active');
    pill.classList.remove('expanded');
    pill.style.borderColor = '';
    pill.style.boxShadow   = '';
    inp.value = ''; // 🪲
    inp.style.color = '';
    if(typeof syncZoneState === 'function') syncZoneState();
  });

  // Функция обновления отображения хештегов в поисковой строке
  var searchContainer = document.getElementById('search-hashtags-container');
  function makeBadge(tag, side, animate){
    var badge = document.createElement('div');
    badge.className = 'search-tag-badge side-' + side;
    badge.dataset.tag = tag;
    badge.style.animationDelay = animate ? '320ms' : '0ms';

    var tagText = document.createElement('span');
    tagText.textContent = tag.replace(/^#/,'');
    badge.appendChild(tagText);

    var closeBtn = document.createElement('span');
    closeBtn.className = 'search-tag-badge-close';
    closeBtn.textContent = '×';

    function removeTag(e){
      e.stopPropagation();
      activeTags.delete(tag);
      leftEl.querySelectorAll('.htag.active').forEach(function(b){
        if(b.dataset.tag===tag) b.classList.remove('active');
      });
      rightEl.querySelectorAll('.htag.active').forEach(function(b){
        if(b.dataset.tag===tag) b.classList.remove('active');
      });
      applyHashtagFilter(); // 🪲 уже вызывает render() внутри
      updateSearchTagsDisplay();
    }
    closeBtn.addEventListener('click', removeTag);
    badge.appendChild(closeBtn);
    badge.addEventListener('click', function(e){
      if(e.target===closeBtn || e.target.parentElement===closeBtn) return;
      removeTag(e);
    });
    return badge;
  }

  function updateSearchTagsDisplay(){
    var pill = document.getElementById('search-pill');
    var inp  = document.getElementById('search-input');
    var pillWasClosed = !pill.classList.contains('expanded') && !pill.classList.contains('active');

    if(activeTags.size > 0){
      pill.classList.add('active');
      pill.classList.add('expanded');
    } else {
      if(document.activeElement !== inp && !searchQuery){
        pill.classList.remove('active');
        pill.classList.remove('expanded');
      }
    }
    if(typeof syncZoneState === 'function') syncZoneState();

    // Remove badges for tags no longer active
    Array.from(searchContainer.children).forEach(function(el){
      if(!activeTags.has(el.dataset.tag)) searchContainer.removeChild(el);
    });

    // Add badges only for newly added tags — existing ones stay untouched
    activeTags.forEach(function(side, tag){
      if(searchContainer.querySelector('[data-tag="'+CSS.escape(tag)+'"]')) return;
      // Animate in: delayed if pill just opened, immediate if pill was already open
      searchContainer.appendChild(makeBadge(tag, side, pillWasClosed));
    });
  }
  window.updateSearchTagsDisplay = updateSearchTagsDisplay; // 🪲 экспорт для вызова снаружи IIFE (Escape в поиске)

})();

// ── Link Lines: draw animated connection lines between linked notes ────────
var _linkLinesSvg = document.getElementById('link-lines-svg');
var _linkLinesRaf = null;
var _linkLinesActive = false;

function getNodeCenter(docId){
  var w = pool[docId];
  if(!w) return null;
  var node = w._node || w.querySelector('.node');
  if(!node) return null;
  var nr = node.getBoundingClientRect();
  if(nr.width < 2) return null;
  return {
    x: (nr.left + nr.right) / 2,
    y: (nr.top + nr.bottom) / 2,
    r: nr.width / 2
  };
}


// ── Hover link lines: тонкие пунктиры при наведении на шарик ─────────────────
var _hoverLinesSvg = document.getElementById('hover-lines-svg');

function clearHoverLines(){
  if(!_hoverLinesSvg) return;
  // 🪲🪲 Очищаем кэш NodeList — до обнуления _hoverLinesDoc, иначе кэш остаётся на doc-объекте
  if(_hoverLinesDoc){ _hoverLinesDoc._cachedHoverPaths = null; _hoverLinesDoc._cachedHoverGrads = null; }
  while(_hoverLinesSvg.firstChild) _hoverLinesSvg.removeChild(_hoverLinesSvg.firstChild);
  // Stop live update loop
  _hoverLinesDoc = null;
  if(_hoverLinesRaf){ cancelAnimationFrame(_hoverLinesRaf); clearTimeout(_hoverLinesRaf); _hoverLinesRaf = null; } // 🪲 отменяем и RAF и setTimeout (throttle)
}

// Live hover-lines update: redraws when offset or window size changes
var _hoverLinesDoc      = null;
var _hoverLinesRaf      = null;
var _hoverLinesOffset   = null;
var _hoverLinesWinW     = 0;
var _hoverLinesWinH     = 0;

function _hoverLinesLoop(){
  _hoverLinesRaf = null;
  if(!_hoverLinesDoc) return;
  var changed = (offset !== _hoverLinesOffset ||
                 window.innerWidth  !== _hoverLinesWinW ||
                 window.innerHeight !== _hoverLinesWinH);
  if(changed){
    _hoverLinesOffset = offset;
    _hoverLinesWinW   = window.innerWidth;
    _hoverLinesWinH   = window.innerHeight;
    _redrawHoverLinePaths(_hoverLinesDoc);
  }
  if(_hoverLinesDoc){ // 🪲 продолжаем только если doc ещё активен
    // 🪲 Throttle: при отсутствии изменений перепроверяем раз в 100мс вместо каждого кадра — экономим CPU при статичной сцене
    if(changed){
      _hoverLinesRaf = requestAnimationFrame(_hoverLinesLoop);
    } else {
      _hoverLinesRaf = setTimeout(function(){ _hoverLinesRaf = requestAnimationFrame(_hoverLinesLoop); }, 100);
    }
  }
}

function _redrawHoverLinePaths(doc){
  if(!_hoverLinesSvg) return;
  var srcCenter = getNodeCenter(doc.id);
  if(!srcCenter) return;
  var paths = (doc._cachedHoverPaths) ? doc._cachedHoverPaths : _hoverLinesSvg.querySelectorAll('path'); // 🪲 кэш
  var grads = (doc._cachedHoverGrads) ? doc._cachedHoverGrads : _hoverLinesSvg.querySelectorAll('linearGradient'); // 🪲 кэш
  // 🪲 domIdx считает только реально созданные DOM-элементы (пропущенные линки не создают path/grad)
  var domIdx = 0;
  doc.links.forEach(function(targetId){
    var tgtCenter = getNodeCenter(targetId);
    if(!tgtCenter) return; // нет DOM-элемента для этого линка — не инкрементируем domIdx
    var dx = tgtCenter.x - srcCenter.x;
    var dy = tgtCenter.y - srcCenter.y;
    var len = Math.sqrt(dx*dx + dy*dy) || 1;
    var curve = Math.min(len * 0.18, 60);
    var cpx = (srcCenter.x + tgtCenter.x)/2 - dy/len * curve;
    var cpy = (srcCenter.y + tgtCenter.y)/2 + dx/len * curve;
    var d = 'M'+srcCenter.x+','+srcCenter.y+' Q'+cpx+','+cpy+' '+tgtCenter.x+','+tgtCenter.y;
    if(paths[domIdx]) paths[domIdx].setAttribute('d', d);
    if(grads[domIdx]){
      grads[domIdx].setAttribute('x1', srcCenter.x); grads[domIdx].setAttribute('y1', srcCenter.y);
      grads[domIdx].setAttribute('x2', tgtCenter.x); grads[domIdx].setAttribute('y2', tgtCenter.y);
    }
    domIdx++;
  });
}

function drawHoverLines(doc){
  if(!_hoverLinesSvg) return;
  clearHoverLines();
  if(!doc || !doc.links || !doc.links.length) return;
  // Не рисуем hover-линии если этот шарик уже закреплён (у него уже полные линии)
  if(doc.id === activeDocId || doc.id === pinnedDocId) return;

  var srcCenter = getNodeCenter(doc.id);
  if(!srcCenter) return;

  var defs = document.createElementNS('http://www.w3.org/2000/svg','defs');
  _hoverLinesSvg.appendChild(defs); // 🪲 defs must be in DOM before elements referencing url(#...)

  doc.links.forEach(function(targetId, idx){
    var targetDoc = _docsById[targetId]; // 🪲 O(1) вместо DOCS.find O(n)
    if(!targetDoc) return;
    var tgtCenter = getNodeCenter(targetId);
    if(!tgtCenter) return;

    var gradId = 'hov-lg-' + doc.id + '-' + targetId;
    var grad = document.createElementNS('http://www.w3.org/2000/svg','linearGradient');
    grad.setAttribute('id', gradId);
    grad.setAttribute('gradientUnits','userSpaceOnUse');
    grad.setAttribute('x1', srcCenter.x); grad.setAttribute('y1', srcCenter.y);
    grad.setAttribute('x2', tgtCenter.x); grad.setAttribute('y2', tgtCenter.y);
    var s0 = document.createElementNS('http://www.w3.org/2000/svg','stop');
    s0.setAttribute('offset','0%');
    s0.setAttribute('stop-color', doc.color);
    s0.setAttribute('stop-opacity','0.7');
    var s1 = document.createElementNS('http://www.w3.org/2000/svg','stop');
    s1.setAttribute('offset','100%');
    s1.setAttribute('stop-color', targetDoc.color);
    s1.setAttribute('stop-opacity','0.7');
    grad.appendChild(s0); grad.appendChild(s1);
    defs.appendChild(grad);

    var dx = tgtCenter.x - srcCenter.x;
    var dy = tgtCenter.y - srcCenter.y;
    var len = Math.sqrt(dx*dx + dy*dy) || 1;
    var curve = Math.min(len * 0.18, 60);
    var cpx = (srcCenter.x + tgtCenter.x)/2 - dy/len * curve;
    var cpy = (srcCenter.y + tgtCenter.y)/2 + dx/len * curve;

    var line = document.createElementNS('http://www.w3.org/2000/svg','path');
    line.setAttribute('d', 'M'+srcCenter.x+','+srcCenter.y+' Q'+cpx+','+cpy+' '+tgtCenter.x+','+tgtCenter.y);
    line.setAttribute('stroke', 'url(#'+gradId+')');
    line.setAttribute('stroke-width','1');
    line.setAttribute('stroke-dasharray','4 6');
    line.setAttribute('fill','none');
    line.setAttribute('stroke-linecap','round');
    line.style.opacity = '0';
    line.style.transition = 'opacity .2s ease ' + (idx*40) + 'ms';
    _hoverLinesSvg.appendChild(line);
  });

  // Start live update loop so lines follow nodes during scroll/resize
  _hoverLinesDoc    = doc; // 🪲🪲 устанавливаем ДО RAF — иначе guard в RAF сравнивает со старым значением
  _hoverLinesOffset = offset;
  _hoverLinesWinW   = window.innerWidth;
  _hoverLinesWinH   = window.innerHeight;

  requestAnimationFrame(function(){
    if(_hoverLinesDoc !== doc) return; // 🪲🪲 hover уже снят — SVG очищен, не кэшируем пустой NodeList
    _hoverLinesSvg.querySelectorAll('path').forEach(function(el){
      el.style.opacity = '0.5';
    });
    // 🪲 Кэшируем NodeList после создания — querySelectorAll в _redrawHoverLinePaths вызывается при каждом скролле
    doc._cachedHoverPaths = _hoverLinesSvg.querySelectorAll('path');
    doc._cachedHoverGrads = _hoverLinesSvg.querySelectorAll('linearGradient');
  });

  if(_hoverLinesRaf){ cancelAnimationFrame(_hoverLinesRaf); clearTimeout(_hoverLinesRaf); } // 🪲 отменяем и RAF и setTimeout (throttle) — аналогично clearHoverLines
  _hoverLinesRaf = requestAnimationFrame(_hoverLinesLoop);
}

var _clearLinkGen = 0; // 🪲 счётчик версии очистки — предотвращает удаление новых линий

function clearLinkLines(){
  _linkLinesActive = false;
  if(_linkLinesRaf){ cancelAnimationFrame(_linkLinesRaf); clearTimeout(_linkLinesRaf); _linkLinesRaf = null; } // 🪲🪲 RAF может содержать setTimeout ID после throttle
  // Fade out existing lines
  var lines = _linkLinesSvg.querySelectorAll('.link-line, .link-node-glow, .link-particle');
  lines.forEach(function(el){ el.style.opacity = '0'; });
  var _gen = ++_clearLinkGen; // 🪲 фиксируем версию этого вызова
  setTimeout(function(){
    if(_gen !== _clearLinkGen) return; // 🪲 drawLinkLines вызвался раньше — не удаляем новые линии
    while(_linkLinesSvg.firstChild) _linkLinesSvg.removeChild(_linkLinesSvg.firstChild);
  }, 420);
}

function drawLinkLines(){
  var _drawId = activeDocId || pinnedDocId;
  if(!_drawId) return;
  var doc = DOCS.find(function(d){ return d.id === _drawId; });
  if(!doc || !doc.links || doc.links.length === 0){ clearLinkLines(); return; }

  // Clear previous RAF loop and DOM before rebuilding 🪲🪲
  if(_linkLinesRaf){ cancelAnimationFrame(_linkLinesRaf); clearTimeout(_linkLinesRaf); _linkLinesRaf = null; }
  _linkLinesActive = false;
  _clearLinkGen++; // 🪲 инвалидируем pending clearLinkLines-timeout — не удаляем только что созданные линии
  while(_linkLinesSvg.firstChild) _linkLinesSvg.removeChild(_linkLinesSvg.firstChild);

  var srcCenter = getNodeCenter(doc.id);
  if(!srcCenter) return;

  var color = doc.color;

  var defs = document.createElementNS('http://www.w3.org/2000/svg','defs');
  _linkLinesSvg.appendChild(defs); // 🪲 defs must be in DOM before elements referencing url(#...)

  doc.links.forEach(function(targetId, idx){
    var targetDoc = _docsById[targetId]; // 🪲 O(1) вместо DOCS.find O(n)
    if(!targetDoc) return;
    var tgtCenter = getNodeCenter(targetId);
    if(!tgtCenter) return;

    var tColor = targetDoc.color;

    // Gradient id for this link
    var gradId  = 'lg-' + doc.id + '-' + targetId;
    var glowId  = 'glow-' + doc.id + '-' + targetId;

    // Gradient: source color → target color
    var grad = document.createElementNS('http://www.w3.org/2000/svg','linearGradient');
    grad.setAttribute('id', gradId);
    grad.setAttribute('gradientUnits','userSpaceOnUse');
    grad.setAttribute('x1', srcCenter.x); grad.setAttribute('y1', srcCenter.y);
    grad.setAttribute('x2', tgtCenter.x); grad.setAttribute('y2', tgtCenter.y);
    var s0 = document.createElementNS('http://www.w3.org/2000/svg','stop');
    s0.setAttribute('offset','0%');
    s0.setAttribute('stop-color', color);
    s0.setAttribute('stop-opacity','0.9');
    var s1 = document.createElementNS('http://www.w3.org/2000/svg','stop');
    s1.setAttribute('offset','100%');
    s1.setAttribute('stop-color', tColor);
    s1.setAttribute('stop-opacity','0.9');
    grad.appendChild(s0); grad.appendChild(s1);
    defs.appendChild(grad);

    // Glow filter
    var filt = document.createElementNS('http://www.w3.org/2000/svg','filter');
    filt.setAttribute('id', glowId);
    filt.setAttribute('x','-50%'); filt.setAttribute('y','-50%');
    filt.setAttribute('width','200%'); filt.setAttribute('height','200%');
    var blur = document.createElementNS('http://www.w3.org/2000/svg','feGaussianBlur');
    blur.setAttribute('stdDeviation','3');
    blur.setAttribute('result','coloredBlur');
    var merge = document.createElementNS('http://www.w3.org/2000/svg','feMerge');
    var mn1 = document.createElementNS('http://www.w3.org/2000/svg','feMergeNode');
    mn1.setAttribute('in','coloredBlur');
    var mn2 = document.createElementNS('http://www.w3.org/2000/svg','feMergeNode');
    mn2.setAttribute('in','SourceGraphic');
    merge.appendChild(mn1); merge.appendChild(mn2);
    filt.appendChild(blur); filt.appendChild(merge);
    defs.appendChild(filt);

    // Compute path: slight curve via midpoint offset
    var mx = (srcCenter.x + tgtCenter.x) / 2;
    var my = (srcCenter.y + tgtCenter.y) / 2;
    // Perpendicular nudge for curve
    var dx = tgtCenter.x - srcCenter.x;
    var dy = tgtCenter.y - srcCenter.y;
    var len = Math.sqrt(dx*dx + dy*dy) || 1;
    var curve = Math.min(len * 0.18, 60);
    var cpx = mx - dy/len * curve;
    var cpy = my + dx/len * curve;

    // Glow (fat blurred copy)
    var glowPath = document.createElementNS('http://www.w3.org/2000/svg','path');
    glowPath.setAttribute('d', 'M'+srcCenter.x+','+srcCenter.y+' Q'+cpx+','+cpy+' '+tgtCenter.x+','+tgtCenter.y);
    glowPath.setAttribute('stroke', 'url(#'+gradId+')');
    glowPath.setAttribute('stroke-width','6');
    glowPath.setAttribute('class','link-line');
    glowPath.setAttribute('filter','url(#'+glowId+')');
    glowPath.style.opacity = '0';
    glowPath.style.transition = 'opacity .5s ease '+(idx*80)+'ms';

    // Main line with dash animation
    var linePath = document.createElementNS('http://www.w3.org/2000/svg','path');
    linePath.setAttribute('d', 'M'+srcCenter.x+','+srcCenter.y+' Q'+cpx+','+cpy+' '+tgtCenter.x+','+tgtCenter.y);
    linePath.setAttribute('stroke', 'url(#'+gradId+')');
    linePath.setAttribute('stroke-width','1.5');
    linePath.setAttribute('stroke-dasharray', '6 5');
    linePath.setAttribute('class','link-line');
    linePath.style.opacity = '0';
    linePath.style.transition = 'opacity .5s ease '+(idx*80)+'ms';
    linePath.style.animation = 'linkDash 2.4s linear infinite '+(idx*0.4)+'s, linkPulse 2.8s ease-in-out infinite '+(idx*0.3)+'s';

    // Target node halo ring
    var halo = document.createElementNS('http://www.w3.org/2000/svg','circle');
    halo.setAttribute('cx', tgtCenter.x);
    halo.setAttribute('cy', tgtCenter.y);
    halo.setAttribute('r',  tgtCenter.r + 5);
    halo.setAttribute('stroke', tColor);
    halo.setAttribute('stroke-width', '1.5');
    halo.setAttribute('class', 'link-node-glow');
    halo.style.opacity = '0';
    halo.style.transition = 'opacity .5s ease '+(idx*80+120)+'ms';
    halo.style.animation = 'linkPulse 2.2s ease-in-out infinite '+(idx*0.5)+'s';

    _linkLinesSvg.appendChild(glowPath);
    _linkLinesSvg.appendChild(linePath);
    _linkLinesSvg.appendChild(halo);
  });

  _linkLinesActive = true;

  // Кэшируем DOM-элементы сразу после создания — querySelectorAll не должен вызываться в RAF-цикле 🪲
  var _cachedLinkLines = null;
  var _cachedLinkHalos = null;
  var _cachedLinkGrads = null;

  // Trigger fade-in on next frame
  requestAnimationFrame(function(){
    _cachedLinkLines = _linkLinesSvg.querySelectorAll('.link-line');
    _cachedLinkHalos = _linkLinesSvg.querySelectorAll('.link-node-glow');
    _cachedLinkGrads = _linkLinesSvg.querySelectorAll('linearGradient');
    _cachedLinkLines.forEach(function(el){ el.style.opacity = '0.75'; }); // 🪲 убрана мёртвая ветка: .link-line никогда не имеет класса link-node-glow
    _cachedLinkHalos.forEach(function(el){ el.style.opacity = '0.65'; });
    // Start live position update loop
    _updateLinkLinesLoop(_cachedLinkLines, _cachedLinkHalos, _cachedLinkGrads, doc);
  });
}

function _updateLinkLinesLoop(cachedLines, cachedHalos, cachedGrads, cachedDoc){
  var _loopId = activeDocId || pinnedDocId;
  if(!_linkLinesActive || !_loopId) return;
  var doc = cachedDoc || _docsById[_loopId]; // 🪲 O(1) вместо DOCS.find O(n)
  if(!doc || !doc.links || !doc.links.length) return;

  // Re-draw paths & halos: always during drag/animation, otherwise only when offset or window size changes
  var _forceNow = performance.now() < _linkLinesForceUntil;
  var _winChanged = (window.innerWidth !== _lastLinkWinW || window.innerHeight !== _lastLinkWinH);
  if(_ghostState || moving || _forceNow || _winChanged || offset !== _lastLinkOffset){
    if(!_forceNow) _lastLinkOffset = offset; // во время force не фиксируем offset — обновляем каждый кадр
    if(_winChanged){ _lastLinkWinW = window.innerWidth; _lastLinkWinH = window.innerHeight; }
    var srcCenter = getNodeCenter(doc.id);
    if(srcCenter){
      // 🪲 Используем кэшированные NodeList вместо querySelectorAll каждый кадр
      var lines   = cachedLines || _linkLinesSvg.querySelectorAll('.link-line');
      var halos   = cachedHalos || _linkLinesSvg.querySelectorAll('.link-node-glow');
      var grads   = cachedGrads || _linkLinesSvg.querySelectorAll('linearGradient');
      var lineIdx = 0;
      doc.links.forEach(function(targetId, idx){
        // drawLinkLines пропускает линк при !targetDoc — синхронизируем: не инкрементируем lineIdx 🪲🪲
        var _tdLoop = _docsById[targetId]; // 🪲 O(1) вместо DOCS.find O(n)
        if(!_tdLoop) return;
        var tgtCenter = getNodeCenter(targetId);
        if(!tgtCenter) return; // 🪲🪲 drawLinkLines тоже пропускает при !tgtCenter — DOM не создан, lineIdx не трогаем

        var dx = tgtCenter.x - srcCenter.x;
        var dy = tgtCenter.y - srcCenter.y;
        var len = Math.sqrt(dx*dx + dy*dy) || 1;
        var curve = Math.min(len * 0.18, 60);
        var cpx = (srcCenter.x + tgtCenter.x)/2 - dy/len * curve;
        var cpy = (srcCenter.y + tgtCenter.y)/2 + dx/len * curve;
        var d = 'M'+srcCenter.x.toFixed(1)+','+srcCenter.y.toFixed(1)+' Q'+cpx.toFixed(1)+','+cpy.toFixed(1)+' '+tgtCenter.x.toFixed(1)+','+tgtCenter.y.toFixed(1);

        if(lines[lineIdx*2])   lines[lineIdx*2].setAttribute('d', d);
        if(lines[lineIdx*2+1]) lines[lineIdx*2+1].setAttribute('d', d);
        if(halos[lineIdx]){
          halos[lineIdx].setAttribute('cx', tgtCenter.x.toFixed(1));
          halos[lineIdx].setAttribute('cy', tgtCenter.y.toFixed(1));
          halos[lineIdx].setAttribute('r', (tgtCenter.r + 5).toFixed(1));
        }
        // Update gradient coords
        if(grads[lineIdx]){
          grads[lineIdx].setAttribute('x1', srcCenter.x.toFixed(1));
          grads[lineIdx].setAttribute('y1', srcCenter.y.toFixed(1));
          grads[lineIdx].setAttribute('x2', tgtCenter.x.toFixed(1));
          grads[lineIdx].setAttribute('y2', tgtCenter.y.toFixed(1));
        }
        lineIdx++;
      });
    }
  }

  // 🪲🪲 Throttle: при отсутствии изменений — 100мс вместо RAF каждый кадр (экономим CPU)
  var _idle = !_ghostState && !moving && !_forceNow && !_winChanged && offset === _lastLinkOffset;
  if(_idle){
    _linkLinesRaf = setTimeout(function(){ _linkLinesRaf = requestAnimationFrame(function(){ _updateLinkLinesLoop(cachedLines, cachedHalos, cachedGrads, cachedDoc); }); }, 100);
  } else {
    _linkLinesRaf = requestAnimationFrame(function(){ _updateLinkLinesLoop(cachedLines, cachedHalos, cachedGrads, cachedDoc); }); // 🪲 передаём кэш
  }
}

var _lastLinkOffset = null;
var _linkLinesForceUntil = 0; // timestamp до которого _updateLinkLinesLoop обновляет каждый кадр
var _lastLinkWinW = window.innerWidth;
var _lastLinkWinH = window.innerHeight;
window.addEventListener('resize', function(){
  // При ресайзе форсируем обновление линий связи на 600мс
  _linkLinesForceUntil = performance.now() + 600;
  _lastLinkWinW = window.innerWidth;
  _lastLinkWinH = window.innerHeight;
});


</script>
</body>
</html>
