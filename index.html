<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>🧠 Memory Space</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Exo+2:wght@700;800&family=Share+Tech+Mono&family=Inter:wght@400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#030408;overflow:hidden;width:100vw;height:100vh;font-family:'Share Tech Mono','Courier New',monospace;color:#cce8f8;user-select:none;-webkit-user-select:none}
#app{width:100vw;height:100vh;position:relative;overflow:visible;touch-action:none}
#grid-floor{position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(rgba(0,229,255,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.07) 1px,transparent 1px);background-size:66px 66px;transform:perspective(950px) rotateX(55deg) translateY(40%) scale(2.5);transform-origin:center 80%;opacity:.8}
#grid-ceil{position:absolute;top:0;left:0;right:0;height:42%;pointer-events:none;background-image:linear-gradient(rgba(198,120,221,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(198,120,221,.04) 1px,transparent 1px);background-size:82px 82px;transform:perspective(620px) rotateX(-28deg) translateY(-28%);transform-origin:top center}
#horizon{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);height:110px;pointer-events:none;background:radial-gradient(ellipse 75% 50% at center,rgba(0,229,255,.055) 0%,transparent 70%)}
#scanlines{position:absolute;inset:0;pointer-events:none;z-index:400;mix-blend-mode:multiply;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.11) 3px,rgba(0,0,0,.11) 4px)}
#vignette{position:absolute;inset:0;pointer-events:none;z-index:300;background:radial-gradient(ellipse 100% 100% at center,transparent 44%,rgba(1,2,10,.9) 100%)}
#scene{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:50;transform:perspective(1500px) rotateX(4deg);transition:transform .75s cubic-bezier(.22,.8,.3,1);transform-style:preserve-3d}
#scene.moving{transform:perspective(1500px) rotateX(8deg)}
.doc-wrap{position:absolute;left:50%;top:50%;transform-origin:center center;will-change:transform,opacity}
/* ── Timeline node: always a circle ── */
.node{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.6rem;cursor:pointer;position:relative;transition:box-shadow .3s,transform .2s;flex-shrink:0}
.node:hover{transform:scale(1.27);filter:brightness(1.6) saturate(1.4)}
.node.hovered{transform:scale(1.27);filter:brightness(1.6) saturate(1.4)}
.node-ring{position:absolute;inset:-3px;border-radius:50%;border:1.5px solid;opacity:.55;animation:nodeRing 2.5s ease-in-out infinite}
.node.active .node-ring{opacity:1;animation:nodeRingPulse 1.5s ease-in-out infinite}
/* ── Expanded card (center overlay) ── */
#card-panel{position:absolute;inset:0;z-index:750;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .35s}
#card-panel.show{opacity:1;pointer-events:all}
#card-box{width:320px;background:rgba(2,4,14,.96);border-radius:14px;padding:24px 24px 18px;backdrop-filter:blur(24px);color:#cce8f8;position:relative;overflow:hidden;transform:scale(0.88) translateY(18px);transition:transform .38s cubic-bezier(.22,.8,.3,1)}
#card-panel.show #card-box{transform:scale(1) translateY(0)}
.c-tr{position:absolute;top:7px;right:7px;width:12px;height:12px;border-top:1px solid;border-right:1px solid;opacity:.55}
.c-bl{position:absolute;bottom:7px;left:7px;width:12px;height:12px;border-bottom:1px solid;border-left:1px solid;opacity:.55}
.c-glow{position:absolute;top:0;left:0;right:0;bottom:0;border-radius:14px;pointer-events:none}
.c-emoji{font-size:2rem;line-height:1}
.c-type{font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;opacity:.88}
.c-date{font-size:.6rem;letter-spacing:.04em;margin-top:2px;color:#8ab2cc77}
.c-title{font-family:'Exo 2',sans-serif;font-size:.95rem;font-weight:700;line-height:1.3;margin-bottom:5px}
.c-sub{font-size:.63rem;color:#88b0ccaa;font-style:italic;margin-bottom:12px}
.c-body{font-size:.72rem;line-height:1.68;color:#c0dff0cc;margin-bottom:12px}
.tag{font-size:.58rem;padding:2px 8px;border-radius:20px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);color:rgba(176,208,228,.75);letter-spacing:.03em;display:inline-block;margin:2px}
.links-wrap{border-top:1px solid rgba(255,255,255,.07);padding-top:10px;margin-bottom:8px}
.links-lbl{font-size:.57rem;color:rgba(136,176,204,.4);letter-spacing:.1em;text-transform:uppercase;display:block;margin-bottom:6px}
.link-btn{display:block;width:100%;text-align:left;border-radius:5px;padding:4px 10px;font-size:.61rem;font-family:inherit;cursor:pointer;margin-bottom:4px;transition:background .2s;border:1px solid}
#card-close{position:absolute;top:10px;right:10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.5);font-family:inherit;padding:3px 11px;border-radius:20px;cursor:pointer;font-size:.6rem;letter-spacing:.1em}

/* ── Edit mode ──────────────────────────────────────────────────────────── */
.c-edit-btn{position:absolute;top:10px;left:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.35);font-family:inherit;padding:3px 9px;border-radius:20px;cursor:pointer;font-size:.75rem;transition:all .2s;line-height:1}
.c-edit-btn:hover{background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);border-color:rgba(255,255,255,.3)}
body.light .c-edit-btn{background:rgba(0,0,0,.04);border-color:rgba(0,0,0,.1);color:rgba(0,0,0,.3)}
body.light .c-edit-btn:hover{background:rgba(0,0,0,.09);color:rgba(0,0,0,.6)}

/* Format toolbar */
.c-fmt-bar{display:flex;align-items:center;gap:3px;margin-bottom:8px;padding:3px 4px;border-radius:8px;background:none;border:none;flex-wrap:wrap}
body.light .c-fmt-bar{background:rgba(0,0,0,.04);border:1px solid rgba(0,0,0,.07);padding:4px 6px}
.c-fmt-btn{background:none;border:none;cursor:pointer;font-size:.88rem;padding:2px 5px;border-radius:5px;line-height:1;transition:background .15s;color:rgba(255,255,255,.68)}
.c-fmt-btn:hover{background:rgba(255,255,255,.12);color:rgba(255,255,255,1)}
body.light .c-fmt-btn{color:rgba(0,0,0,.55)}
body.light .c-fmt-btn:hover{background:rgba(0,0,0,.1);color:rgba(0,0,0,.85)}
.c-fmt-sep{width:1px;height:14px;background:rgba(255,255,255,.2);margin:0 2px;flex-shrink:0}
body.light .c-fmt-sep{background:rgba(0,0,0,.12)}

/* Editable fields */
.c-edit-field{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:7px;padding:6px 9px;color:inherit;font-family:inherit;font-size:inherit;width:100%;resize:none;outline:none;transition:border-color .2s;line-height:inherit}
.c-edit-field:focus{border-color:rgba(255,255,255,.28);background:rgba(255,255,255,.07)}
body.light .c-edit-field{background:rgba(0,0,0,.04);border-color:rgba(0,0,0,.1);color:#1a2a3f}
body.light .c-edit-field:focus{border-color:rgba(0,0,0,.28);background:rgba(0,0,0,.06)}

/* Rich content area with contenteditable */
.c-edit-rich{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:7px;padding:7px 9px;color:#c0dff0cc;font-family:'Share Tech Mono','Courier New',monospace;font-size:.72rem;line-height:1.68;width:100%;min-height:60px;outline:none;transition:border-color .2s;cursor:text;white-space:pre-wrap;word-break:break-word}
.c-edit-rich:focus{border-color:rgba(255,255,255,.28);background:rgba(255,255,255,.07)}
body.light .c-edit-rich{background:rgba(0,0,0,.04);border-color:rgba(0,0,0,.1);color:rgba(35,55,80,.85)}
body.light .c-edit-rich:focus{border-color:rgba(0,0,0,.28)}

/* Save button */
.c-save-btn{display:block;width:100%;padding:7px;border-radius:8px;border:1px solid;font-family:inherit;font-size:.65rem;letter-spacing:.1em;cursor:pointer;margin-top:10px;transition:all .2s;text-align:center}
.c-save-btn:hover{transform:translateY(-1px)}
.c-save-btn:active{transform:translateY(0)}

/* Edit label */
.c-edit-lbl{font-size:.54rem;letter-spacing:.12em;text-transform:uppercase;opacity:.38;margin-bottom:3px;display:block}

/* Color picker swatch button in edit mode */
.c-color-pick{
  width:22px;height:22px;border-radius:50%;
  border:2px solid rgba(255,255,255,.25);
  cursor:pointer;flex-shrink:0;
  transition:transform .15s,border-color .2s,box-shadow .2s;
  position:relative;
}
.c-color-pick:hover{transform:scale(1.18);border-color:rgba(255,255,255,.6);box-shadow:0 0 8px currentColor}
body.light .c-color-pick{border-color:rgba(0,0,0,.2);}
body.light .c-color-pick:hover{border-color:rgba(0,0,0,.5);}

/* Color palette overlay */
#color-palette-overlay{
  position:absolute;inset:0;z-index:910;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.55);backdrop-filter:blur(6px);
  opacity:0;pointer-events:none;
  transition:opacity .22s;
  border-radius:14px;
}
#color-palette-overlay.show{opacity:1;pointer-events:all}
#color-palette-box{
  width:224px;
  background:rgba(4,8,22,.97);
  border:1px solid rgba(255,255,255,.12);
  border-radius:12px;
  padding:14px 14px 12px;
  box-shadow:0 8px 40px rgba(0,0,0,.7);
  transform:scale(.88) translateY(12px);
  transition:transform .26s cubic-bezier(.22,.8,.3,1);
}
#color-palette-overlay.show #color-palette-box{transform:scale(1) translateY(0)}
body.light #color-palette-box{background:rgba(245,248,255,.98);border-color:rgba(0,0,0,.12);}
.cp-title{font-size:.52rem;letter-spacing:.12em;text-transform:uppercase;
  color:rgba(180,200,220,.4);margin-bottom:10px;display:block;}
body.light .cp-title{color:rgba(0,0,0,.3);}
.cp-swatches{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;}
.cp-swatch{
  width:28px;height:28px;border-radius:50%;
  border:2px solid transparent;
  cursor:pointer;
  transition:transform .12s,border-color .12s,box-shadow .12s;
  position:relative;
}
.cp-swatch:hover{transform:scale(1.22);box-shadow:0 0 10px currentColor;}
.cp-swatch.active{border-color:rgba(255,255,255,.9);transform:scale(1.15);}
body.light .cp-swatch.active{border-color:rgba(0,0,0,.7);}
.cp-close{
  display:block;width:100%;margin-top:12px;padding:5px;
  background:none;border:1px solid rgba(255,255,255,.1);
  border-radius:7px;font-family:inherit;font-size:.58rem;
  letter-spacing:.1em;color:rgba(200,220,240,.4);
  cursor:pointer;transition:all .18s;
}
.cp-close:hover{background:rgba(255,255,255,.07);color:rgba(200,220,240,.8);}
body.light .cp-close{border-color:rgba(0,0,0,.1);color:rgba(0,0,0,.35);}
body.light .cp-close:hover{background:rgba(0,0,0,.05);color:rgba(0,0,0,.65);}

/* ── Emoji picker overlay ───────────────────────────────────────────────── */
#emoji-picker-overlay{
  position:absolute;inset:0;z-index:900;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.55);backdrop-filter:blur(6px);
  opacity:0;pointer-events:none;
  transition:opacity .25s;
  border-radius:14px;
}
#emoji-picker-overlay.show{opacity:1;pointer-events:all}
#emoji-picker-box{
  width:272px;max-height:320px;
  background:rgba(4,8,22,.97);
  border:1px solid rgba(255,255,255,.12);
  border-radius:12px;
  overflow:hidden;
  display:flex;flex-direction:column;
  box-shadow:0 8px 40px rgba(0,0,0,.7);
  transform:scale(.88) translateY(12px);
  transition:transform .28s cubic-bezier(.22,.8,.3,1);
}
#emoji-picker-overlay.show #emoji-picker-box{transform:scale(1) translateY(0)}
body.light #emoji-picker-box{background:rgba(245,248,255,.98);border-color:rgba(0,0,0,.12);}
#emoji-picker-search{
  background:none;border:none;border-bottom:1px solid rgba(255,255,255,.08);
  color:#cce8f8;font-family:'Share Tech Mono',monospace;font-size:.7rem;
  padding:10px 12px;outline:none;width:100%;letter-spacing:.04em;
}
body.light #emoji-picker-search{color:#1a2a3f;border-bottom-color:rgba(0,0,0,.08);}
#emoji-picker-search::placeholder{color:rgba(200,220,240,.3);font-style:italic}
body.light #emoji-picker-search::placeholder{color:rgba(0,0,0,.25)}
#emoji-picker-grid{
  display:flex;flex-wrap:wrap;gap:2px;padding:8px;
  overflow-y:auto;scrollbar-width:none;flex:1;
  align-content:flex-start;
}
#emoji-picker-grid::-webkit-scrollbar{display:none}
.ep-cat{
  width:100%;font-size:.5rem;letter-spacing:.12em;text-transform:uppercase;
  color:rgba(180,200,220,.3);padding:4px 2px 2px;pointer-events:none;
}
body.light .ep-cat{color:rgba(0,0,0,.25)}
.ep-btn{
  font-size:1.3rem;line-height:1;padding:5px;border-radius:6px;
  cursor:pointer;transition:background .12s, transform .12s;
  border:none;background:none;
}
.ep-btn:hover{background:rgba(255,255,255,.12);transform:scale(1.18)}
body.light .ep-btn:hover{background:rgba(0,0,0,.08)}

/* Clickable emoji in edit header */
.c-emoji-pick{
  font-size:1.8rem;line-height:1;cursor:pointer;
  border-radius:8px;padding:3px 5px;
  transition:background .15s, transform .15s;
  border:1.5px solid rgba(255,255,255,.08);
  position:relative;
}
.c-emoji-pick:hover{background:rgba(255,255,255,.1);transform:scale(1.12)}
body.light .c-emoji-pick:hover{background:rgba(0,0,0,.07)}
.c-emoji-pick::after{
  content:'✎';position:absolute;bottom:-2px;right:-2px;
  font-size:.5rem;background:rgba(80,100,140,.8);color:#cce8f8;
  border-radius:4px;padding:1px 3px;line-height:1;pointer-events:none;
}
body.light .c-emoji-pick::after{background:rgba(180,200,230,.9);color:#1a2a3f}

/* Edit-mode: hashtag columns always lit */
body.card-editing #hashtags-left,
body.card-editing #hashtags-right{
  opacity:1 !important;
  pointer-events:all !important;
  z-index:1200;
}
/* In edit mode, card-panel must not block the sidebar columns */
body.card-editing #card-panel{
  pointer-events:none;
}
body.card-editing #card-box{
  pointer-events:all;
}
/* Emoji picker overlay must always be clickable when shown */
#emoji-picker-overlay.show{
  pointer-events:all !important;
}
body.card-editing #hashtags-left .htag,
body.card-editing #hashtags-right .htag{
  opacity:.75;
  color:rgba(210,225,240,.85);
  transition:opacity .2s, background .2s, color .2s, border-color .2s;
}
body.card-editing.light #hashtags-left .htag,
body.card-editing.light #hashtags-right .htag{
  opacity:.85;color:rgba(20,40,70,.8);
}
/* Tags already on the card get a special "on-card" glow in edit mode */
body.card-editing #hashtags-left .htag.on-card,
body.card-editing #hashtags-right .htag.on-card{
  opacity:1;
}
body.card-editing #hashtags-left .htag.on-card{
  background:rgba(0,180,220,.22);color:rgba(160,235,255,1);border-color:rgba(0,180,220,.6);
}
body.card-editing #hashtags-right .htag.on-card{
  background:rgba(170,90,210,.22);color:rgba(220,170,255,1);border-color:rgba(170,90,210,.6);
}
body.card-editing.light #hashtags-left .htag.on-card{
  background:rgba(0,100,200,.15);color:rgba(0,80,180,1);border-color:rgba(0,100,200,.5);
}
body.card-editing.light #hashtags-right .htag.on-card{
  background:rgba(120,40,180,.13);color:rgba(100,30,160,1);border-color:rgba(120,40,180,.5);
}

/* Tag bar inside edit card */
.c-edit-tags{
  display:flex;flex-wrap:wrap;gap:4px;
  min-height:26px;
  padding:5px 7px;
  border-radius:7px;
  border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.03);
  transition:min-height .25s;
  margin-bottom:10px;
  align-content:flex-start;
}
body.light .c-edit-tags{
  border-color:rgba(0,0,0,.1);background:rgba(0,0,0,.03);
}
.c-edit-tags:empty::before{
  content:'← выбери хэштеги →';
  font-size:.56rem;letter-spacing:.08em;opacity:.28;
  align-self:center;width:100%;text-align:center;
}
.c-etag{
  display:inline-flex;align-items:center;gap:3px;
  border-radius:12px;padding:2px 7px;
  font-size:.6rem;white-space:nowrap;
  cursor:pointer;border:1px solid;
  animation:badgeIn .28s cubic-bezier(.22,.8,.3,1) both;
  transition:all .15s;
}
.c-etag.side-left{background:rgba(0,180,220,.15);border-color:rgba(0,180,220,.4);color:rgba(160,235,255,.95)}
.c-etag.side-left:hover{background:rgba(0,180,220,.27);border-color:rgba(0,180,220,.7)}
.c-etag.side-right{background:rgba(170,90,210,.15);border-color:rgba(170,90,210,.4);color:rgba(220,170,255,.95)}
.c-etag.side-right:hover{background:rgba(170,90,210,.27);border-color:rgba(170,90,210,.7)}
.c-etag-x{font-size:.52rem;opacity:.55;margin-left:1px;line-height:1}
.c-etag-x:hover{opacity:1}

@keyframes nodeRing{0%,100%{transform:scale(1);opacity:.45}50%{transform:scale(1.08);opacity:.7}}
@keyframes nodeRingPulse{0%,100%{transform:scale(1);opacity:.9}50%{transform:scale(1.18);opacity:1}}
#hud{position:absolute;inset:0;pointer-events:none;z-index:600}
#zone{position:absolute;top:24px;left:50%;transform:translateX(-50%);text-align:center;display:flex;flex-direction:column;align-items:center;gap:0;pointer-events:none;padding-top:34px}
/* Поисковая строка — вынесена из потока, чтобы не двигала дату при раскрытии */
#search-wrap{position:absolute;top:0;left:50%;transform:translateX(-50%);display:flex;align-items:flex-start;justify-content:center;pointer-events:none;z-index:10}
#search-pill{display:flex;flex-direction:column;align-items:flex-start;background:rgba(0,255,159,.05);border:1px solid rgba(0,255,159,.22);border-radius:50%;padding:8px;height:28px;min-height:28px;width:28px;overflow:visible;cursor:pointer;box-shadow:0 0 10px rgba(0,255,159,.1);pointer-events:all;gap:6px;
  transition:
    width       .38s cubic-bezier(.22,.8,.3,1) 0ms,
    height      .38s cubic-bezier(.22,.8,.3,1) 0ms,
    border-radius .38s cubic-bezier(.22,.8,.3,1) 160ms,
    background  .3s ease,
    border-color .3s ease,
    box-shadow  .3s ease;
}
#search-pill:hover,#search-pill.expanded{
  width:220px;height:auto;min-height:28px;border-radius:14px;
  background:rgba(0,255,159,.09);border-color:rgba(0,255,159,.38);
  transition:
    width       .38s cubic-bezier(.22,.8,.3,1) 0ms,
    height      .38s cubic-bezier(.22,.8,.3,1) 0ms,
    border-radius .38s cubic-bezier(.22,.8,.3,1) 0ms,
    background  .3s ease,
    border-color .3s ease,
    box-shadow  .3s ease;
}
#search-pill.active{
  width:220px;height:auto;min-height:28px;border-radius:14px;
  background:rgba(0,255,159,.11);border-color:rgba(0,255,159,.55);box-shadow:0 0 18px rgba(0,255,159,.18);
  transition:
    width       .38s cubic-bezier(.22,.8,.3,1) 0ms,
    height      .38s cubic-bezier(.22,.8,.3,1) 0ms,
    border-radius .38s cubic-bezier(.22,.8,.3,1) 0ms,
    background  .3s ease,
    border-color .3s ease,
    box-shadow  .3s ease;
}
#search-icon{font-size:.85rem;line-height:1;flex-shrink:0;opacity:.7;transition:opacity .25s;user-select:none;pointer-events:none}
#search-pill:hover #search-icon,#search-pill.active #search-icon,#search-pill.expanded #search-icon{opacity:0}
#search-input{background:none;border:none;outline:none;color:#b8ffe0;font-family:'Share Tech Mono',monospace;font-size:.68rem;letter-spacing:.06em;width:0;opacity:0;transition:width .4s cubic-bezier(.22,.8,.3,1),opacity .3s;padding:0;caret-color:rgba(0,255,159,1);pointer-events:none}
#search-pill.expanded #search-input,#search-pill.active #search-input{width:176px;opacity:1;pointer-events:all}
#search-input::placeholder{color:rgba(0,255,159,.38);font-style:italic}
/* Хештеги в поисковой строке */
#search-hashtags-container{display:flex;flex-wrap:wrap;gap:4px;width:100%;align-content:flex-start}
#search-pill:not(.active) #search-hashtags-container{display:none}
.search-tag-badge{display:inline-flex;align-items:center;gap:3px;border-radius:12px;padding:2px 7px;font-size:.6rem;white-space:nowrap;flex-shrink:0;cursor:pointer;transition:all .2s;border:1px solid;animation:badgeIn .3s cubic-bezier(.22,.8,.3,1) both}
@keyframes badgeIn{
  0%{opacity:0;transform:scale(0.4);max-width:0;padding-left:0;padding-right:0}
  60%{opacity:1}
  100%{opacity:1;transform:scale(1);max-width:200px;padding-left:7px;padding-right:7px}
}
.search-tag-badge.side-left{background:rgba(0,180,220,.15);border-color:rgba(0,180,220,.4);color:rgba(160,235,255,.95)}
.search-tag-badge.side-left:hover{background:rgba(0,180,220,.27);border-color:rgba(0,180,220,.7)}
.search-tag-badge.side-right{background:rgba(170,90,210,.15);border-color:rgba(170,90,210,.4);color:rgba(220,170,255,.95)}
.search-tag-badge.side-right:hover{background:rgba(170,90,210,.27);border-color:rgba(170,90,210,.7)}
.search-tag-badge-close{display:flex;align-items:center;justify-content:center;width:8px;height:8px;font-size:.5rem;cursor:pointer;opacity:.6;transition:opacity .15s}
.search-tag-badge-close:hover{opacity:1}
/* Дата и дистанция */
/* z-date и z-dist определены выше вместе с search-expanded */
/* Дата и время — всегда за плашкой поиска, плавно растворяются */
#z-date{font-size:1.05rem;letter-spacing:.04em;text-shadow:0 0 20px rgba(0,229,255,.38);margin-top:8px;margin-bottom:4px;color:rgba(200,228,255,.92);transition:color .35s,text-shadow .35s,opacity .15s}
#z-dist{font-size:.85rem;letter-spacing:.08em;color:rgba(160,200,220,.6);transition:color .3s,opacity .15s}
#zone.search-expanded #z-date{opacity:0;pointer-events:none}
#zone.search-expanded #z-dist{opacity:0;pointer-events:none}
/* Present time — green palette matching the star */
#z-date.is-present{color:rgba(0,255,159,.88);text-shadow:0 0 18px rgba(0,255,159,.45)}
#z-dist.is-present{color:rgba(0,255,159,.6)}
#debug-info{position:absolute;top:80px;left:50%;transform:translateX(-50%);font-size:.55rem;color:rgba(0,255,159,.7);background:rgba(0,0,0,.5);padding:4px 8px;border-radius:4px;border:1px solid rgba(0,255,159,.3);display:none;font-family:monospace}
#nav-hint{display:none}
#tl-bar{position:absolute;bottom:0;left:0;right:0;height:54px;pointer-events:none}
#bar-track{position:absolute;bottom:28px;left:0;right:0;height:2px;background:rgba(255,255,255,.07);border-radius:2px}
#bar-now{position:absolute;bottom:0px;left:50%;transform:translateX(-50%);width:2px;height:12px;background:rgba(0,255,159,.7);border-radius:2px 2px 0 0;box-shadow:0 0 8px rgba(0,255,159,.7);will-change:height;overflow:visible;pointer-events:none}
/* ── Якорь на линии времени ─────────────────────────────────────────────────
   Ромбик над засечкой. Чтобы добавить якорь в другое место:
   1. Создай <div class="tl-anchor" style="left: XX%"></div> внутри #bar-track
   2. Повесь onclick с нужной логикой навигации
   ───────────────────────────────────────────────────────────────────────── */
.tl-anchor{position:absolute;bottom:12px;transform:translateX(-50%) rotate(45deg);width:7px;height:7px;background:rgba(0,255,159,.55);border:1px solid rgba(0,255,159,.9);box-shadow:0 0 8px rgba(0,255,159,.6);cursor:pointer;pointer-events:all;z-index:10;transition:background .2s,box-shadow .2s}
.tl-anchor:hover{background:rgba(0,255,159,.95);box-shadow:0 0 16px rgba(0,255,159,1)}
/* ── Present anchor — крупный интерактивный ромб / квадрат-заморозка ── */
#anchor-present{
  left:50%;
  bottom:12px;
  width:7px;height:7px;
  background:rgba(0,255,159,.55);
  border:1px solid rgba(0,255,159,.9);
  box-shadow:0 0 8px rgba(0,255,159,.6);
  pointer-events:all;
  cursor:pointer;
  z-index:650;
  transform:translateX(-50%) rotate(45deg) scale(1);
  transition:transform .55s cubic-bezier(.34,1.56,.64,1), background .45s, border-color .45s, box-shadow .45s;
}
#anchor-present:hover{
  transform:translateX(-50%) rotate(45deg) scale(1.9);
}
/* Замороженный квадрат — rotate(0deg) = грани смотрят вверх/вниз/в стороны */
#anchor-present.frozen{
  background:rgba(255,255,255,.85) !important;
  border-color:rgba(255,255,255,1) !important;
  box-shadow:0 0 16px rgba(255,255,255,.75) !important;
  transform:translateX(-50%) rotate(0deg) scale(1) !important;
}
#anchor-present.frozen:hover{
  transform:translateX(-50%) rotate(0deg) scale(1.9) !important;
}
#anchor-present::before{
  content:'';
  position:absolute;
  inset:-7px;
  border:1px solid rgba(0,255,159,.35);
  border-radius:2px;
  animation:anchorRing 2.4s ease-in-out infinite;
  pointer-events:none;
  transition:border-color .45s, opacity .45s;
}
#anchor-present.frozen::before{
  border-color:rgba(255,255,255,.3);
}
#anchor-present::after{
  content:'';
  position:absolute;
  inset:-14px;
  border:1px solid rgba(0,255,159,.15);
  border-radius:2px;
  animation:anchorRing 2.4s ease-in-out infinite .55s;
  pointer-events:none;
  transition:border-color .45s;
}
#anchor-present.frozen::after{
  border-color:rgba(255,255,255,.12);
}
@keyframes anchorRing{
  0%,100%{transform:scale(.85);opacity:.6}
  50%{transform:scale(1.2);opacity:.2}
}

/* ── Goal Form Modal ──────────────────────────────────────────────────── */
#goal-form-overlay{
  position:absolute;
  inset:0;
  z-index:800;
  display:none;
  align-items:center;
  justify-content:center;
  pointer-events:none;
}
#goal-form-overlay.show{
  display:flex;
  pointer-events:all;
}
#goal-form-box{
  background:#fff;
  border-radius:16px;
  padding:28px 32px;
  box-shadow:0 0 40px rgba(0,0,0,0.25);
  width:340px;
  position:relative;
  transform:scale(0.9) translateY(20px);
  opacity:0;
  transition:transform 0.4s cubic-bezier(.22,.8,.3,1), opacity 0.3s;
}
#goal-form-overlay.show #goal-form-box{
  transform:scale(1) translateY(0);
  opacity:1;
}
body.dark-theme #goal-form-box{
  background:#1a1a1a;
  box-shadow:0 0 60px rgba(0,229,255,0.15);
}
.gf-title{
  font-family:'Exo 2',sans-serif;
  font-size:1.1rem;
  font-weight:700;
  margin-bottom:18px;
  color:#111;
}
body.dark-theme .gf-title{
  color:#cce8f8;
}
.gf-btn{
  background:#00e5ff;
  color:#000;
  border:none;
  border-radius:24px;
  padding:10px 24px;
  font-family:inherit;
  font-size:0.85rem;
  font-weight:600;
  cursor:pointer;
  letter-spacing:0.03em;
  transition:transform 0.2s, box-shadow 0.2s;
  box-shadow:0 2px 8px rgba(0,229,255,0.3);
}
.gf-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 4px 16px rgba(0,229,255,0.5);
}
.gf-btn:active{
  transform:translateY(0);
}

/* ── Goal Square on Timeline ─────────────────────────────────────────── */
.goal-square{
  position:absolute;
  width:18px;
  height:18px;
  background:transparent;
  border:2px solid #ffd700;
  transform:translate(-50%, -50%) rotate(45deg);
  cursor:pointer;
  transition:transform 0.3s, box-shadow 0.3s;
  z-index:100;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:1rem;
}
body.dark-theme .goal-square{
  border:2px solid #ffd700;
  background:transparent;
}
body:not(.dark-theme) .goal-square{
  background:#ffd700;
  border:2px solid #ffd700;
}
.goal-square:hover{
  transform:translate(-50%, -50%) rotate(45deg) scale(1.2);
  box-shadow:0 0 16px rgba(255,215,0,0.8);
}
.goal-square::before{
  content:'';
  position:absolute;
  inset:-5px;
  border:1px solid rgba(255,215,0,0.4);
  animation:goalRing 2.5s ease-in-out infinite;
  pointer-events:none;
}
.goal-square::after{
  content:'';
  position:absolute;
  inset:-10px;
  border:1px solid rgba(255,215,0,0.2);
  animation:goalRing 2.5s ease-in-out infinite 0.6s;
  pointer-events:none;
}
@keyframes goalRing{
  0%,100%{transform:scale(0.9);opacity:0.5}
  50%{transform:scale(1.15);opacity:0.15}
}
.goal-emoji{
  transform:rotate(-45deg);
  pointer-events:none;
}

#bar-now-lbl{position:absolute;bottom:-25px;left:50%;transform:translateX(-50%);font-size:.72rem;letter-spacing:.08em;font-weight:600;color:rgba(0,255,159,1);white-space:nowrap;text-shadow:0 0 12px currentColor;opacity:0;transition:opacity .15s;pointer-events:none}
#bar-thumb{position:absolute;top:50%;width:10px;height:10px;border-radius:50%;transform:translate(-50%,-50%);transition:background .3s;z-index:5}
.blbl{font-size:.55rem;letter-spacing:.12em;opacity:.6}
#tl-labels{position:absolute;bottom:0;left:0;right:0;height:90px;pointer-events:all;overflow:visible}
.tl-label{position:absolute;bottom:3px;transform:translateX(-50%);font-size:.72rem;letter-spacing:.08em;white-space:nowrap;opacity:0;transition:opacity .15s;pointer-events:none;font-weight:600;text-shadow:0 0 12px currentColor}
.tl-tick{position:absolute;bottom:30px;transform:translateX(-50%);width:1px;height:5px;background:rgba(255,255,255,.18);border-radius:2px;pointer-events:none;will-change:height,background}
.tl-hit{position:absolute;bottom:0;transform:translateX(-50%);width:32px;height:90px;cursor:pointer;pointer-events:all;z-index:10;background:transparent}
#arrows{position:absolute;bottom:58px;left:0;right:0;display:flex;justify-content:space-between;padding:0 20px}

#npulse{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:none;align-items:center;justify-content:center;font-size:2rem;z-index:600;pointer-events:none}
#npulse.show{display:flex}
#pulse-ring{position:absolute;width:64px;height:64px;border-radius:50%;border:1px solid rgba(0,229,255,.22);animation:ripple 1s ease-out infinite}
#star-dot{position:absolute;top:calc(50% + 180px);left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:1;opacity:1;transition:none;font-size:1.4rem;line-height:1;animation:starPulse 2.8s ease-in-out infinite;color:rgba(0,255,159,.7);--star-scale:1}
@keyframes starPulse{0%,100%{filter:drop-shadow(0 0 3px rgba(0,255,159,.4));transform:translate(-50%,-50%) scale(calc(var(--star-scale) * .85))}50%{filter:drop-shadow(0 0 9px rgba(0,255,159,.9));transform:translate(-50%,-50%) scale(calc(var(--star-scale) * 1.15))}}
/* Кольца вокруг звёздочки */
#star-dot::before,#star-dot::after{content:'';position:absolute;border-radius:50%;border:1px solid rgba(0,255,159,.35);top:50%;left:50%;transform:translate(-50%,-50%) scale(1);pointer-events:none}
#star-dot::before{width:28px;height:28px;animation:starRing 2.4s ease-in-out infinite}
#star-dot::after{width:46px;height:46px;border-color:rgba(0,255,159,.15);animation:starRing 2.4s ease-in-out infinite .55s}
@keyframes starRing{0%,100%{transform:translate(-50%,-50%) scale(.8);opacity:.7}50%{transform:translate(-50%,-50%) scale(1.15);opacity:.2}}
#modal{position:absolute;inset:0;background:rgba(0,0,8,.78);z-index:800;display:none;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
#modal.show{display:flex}
#modal-inner{transform:scale(1.06)}
#modal-close{position:absolute;top:22px;right:22px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.18);color:rgba(255,255,255,.55);font-family:inherit;padding:5px 14px;border-radius:20px;cursor:pointer;font-size:.65rem;letter-spacing:.1em;z-index:810}
#particles{position:absolute;inset:0;pointer-events:none;z-index:10}
.particle{position:absolute;width:2px;height:2px;border-radius:50%;pointer-events:none}
@keyframes twink{0%,100%{opacity:.2}50%{opacity:.9}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{box-shadow:0 0 8px rgba(0,255,159,.22)}50%{box-shadow:0 0 24px rgba(0,255,159,.55)}}
@keyframes ripple{0%{transform:scale(.8);opacity:.6}100%{transform:scale(2.4);opacity:0}}
/* ── Cluster zone (40d–1y) ──────────────────────────────────────────────────── */
#cluster-svg{position:fixed;inset:0;width:100%;height:100%;z-index:55;overflow:visible;pointer-events:none}
.cluster-shell{pointer-events:all;cursor:default;transition:opacity .25s}
.cluster-emoji{pointer-events:all;cursor:pointer;font-family:serif;dominant-baseline:central;text-anchor:middle}

/* ── Light Theme ──────────────────────────────────────────────────────────── */
body.light{background:#f5f5f5;color:#1a2a3f}
body.light #grid-floor{background-image:linear-gradient(rgba(0,80,200,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(0,80,200,.07) 1px,transparent 1px)}
body.light #grid-ceil{background-image:linear-gradient(rgba(100,50,180,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(100,50,180,.05) 1px,transparent 1px)}
body.light #horizon{background:radial-gradient(ellipse 75% 50% at center,rgba(0,80,255,.04) 0%,transparent 70%)}
body.light #scanlines{opacity:.025}
body.light #vignette{background:radial-gradient(ellipse 100% 100% at center,transparent 38%,rgba(190,205,230,.75) 100%)}
body.light #bar-track{background:rgba(0,0,0,.1)}
body.light #bar-now{background:rgba(0,170,110,.75) !important;box-shadow:none !important}
body.light #bar-now-lbl{color:rgba(0,160,100,1)}
body.light #card-box{background:rgba(244,248,255,.97);color:#1a2a3f;box-shadow:0 2px 20px rgba(0,0,0,.12) !important}
body.light .c-body{color:rgba(35,55,80,.85)}
body.light .c-sub{color:#5a7a9a}
body.light .c-date{color:#7a9ab8}
body.light .tag{border-color:rgba(0,0,0,.1);background:rgba(0,0,0,.03);color:rgba(30,60,100,.72)}
body.light .links-wrap{border-top-color:rgba(0,0,0,.1)}
body.light .links-lbl{color:rgba(60,100,140,.5)}
body.light #z-date{color:rgba(20,40,80,.88);text-shadow:none}
body.light #z-dist{color:rgba(30,60,100,.55)}
body.light #search-pill{background:rgba(0,160,100,.06);border-color:rgba(0,160,100,.22);box-shadow:none}
body.light #search-pill:hover,body.light #search-pill.expanded{background:rgba(0,160,100,.1);border-color:rgba(0,160,100,.38)}
body.light #search-pill.active{background:rgba(0,160,100,.13);border-color:rgba(0,160,100,.55);box-shadow:none}
body.light #search-input{color:#1a2a3f;caret-color:#0055cc}
body.light #search-input::placeholder{color:rgba(0,80,200,.38)}
body.light .tl-label{text-shadow:none}
body.light #theme-hint{color:#1a2a3f}
/* Freeze anchor in light mode */
body.light #anchor-present{background:rgba(0,160,100,.55) !important;border-color:rgba(0,160,100,.9) !important;box-shadow:none !important}
body.light #anchor-present::before{border-color:rgba(0,160,100,.35) !important}
body.light #anchor-present::after{border-color:rgba(0,160,100,.15) !important}
body.light #anchor-present.frozen{background:rgba(30,50,90,.8) !important;border-color:rgba(30,50,90,1) !important;box-shadow:none !important}

/* ── Triangle tick marks ───────────────────────────────────────────────────── */
.tri-tick-fut{stroke:rgba(198,120,221,.45);fill:none;stroke-width:1}
.tri-tick-past{stroke:rgba(0,229,255,.45);fill:none;stroke-width:1}
/* Proximity fade for triangle anchors — all anchor groups start hidden */
.tri-anchor-group{transition:none}
.tri-lbl-fut{fill:rgba(198,120,221,1);font-family:'Share Tech Mono','Courier New',monospace}
.tri-lbl-past{fill:rgba(0,229,255,1);font-family:'Share Tech Mono','Courier New',monospace}
body.light .tri-tick-fut{stroke:rgba(130,60,200,.45)}
body.light .tri-lbl-fut{fill:rgba(130,60,200,.65)}
body.light .tri-tick-past{stroke:rgba(0,112,187,.45)}
body.light .tri-lbl-past{fill:rgba(0,112,187,.65)}
/* Orange particles in light mode */
body.light .particle:nth-child(odd){background:rgba(255,125,30,.55) !important}
body.light .particle:nth-child(even){background:rgba(255,175,60,.4) !important}
/* Star green in light mode — matches anchor-present color */
body.light #star-dot{color:rgba(0,160,100,.8);filter:none}
body.light #star-dot::before{border-color:rgba(0,160,100,.35) !important}
body.light #star-dot::after{border-color:rgba(0,160,100,.15) !important}

/* ── Goal form (zoom mode) ─────────────────────────────────────────────────── */
#goal-overlay{
  position:fixed;inset:0;z-index:900;
  pointer-events:none;
  opacity:0;
  transition:opacity .5s cubic-bezier(.22,.8,.3,1);
}
#goal-overlay.show{opacity:1;pointer-events:all}

/* The form card — centered between the two timeline lines */
#goal-form-card{
  position:absolute;
  left:50%;
  top:calc(50% - 250px);
  transform:translateX(-50%) translateY(30px) scale(0.9);
  width:300px;
  background:#fff;
  border-radius:18px;
  padding:24px 24px 20px;
  box-shadow:0 4px 60px rgba(0,0,0,.22);
  color:#1a2a3f;
  font-family:'Share Tech Mono','Courier New',monospace;
  transition:transform .55s cubic-bezier(.22,.8,.3,1), opacity .4s;
  opacity:0;
  z-index:901;
}
#goal-overlay.show #goal-form-card{
  transform:translateX(-50%) translateY(0) scale(1);
  opacity:1;
}
body:not(.light) #goal-form-card{
  background:rgba(8,12,28,.97);
  color:#cce8f8;
  box-shadow:0 0 0 1px rgba(255,215,0,.22), 0 8px 80px rgba(0,0,0,.8), 0 0 60px rgba(255,215,0,.05);
}
#goal-form-card .gf-label{
  font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;
  opacity:.45;margin-bottom:10px;display:block;text-align:center;
}
#goal-form-card .gf-title{
  font-family:'Exo 2',sans-serif;font-size:1.05rem;font-weight:700;
  text-align:center;margin-bottom:8px;
  color:#FFD700;
  text-shadow:0 0 20px rgba(255,215,0,.4);
}
#goal-anchor-hint{
  font-size:.65rem;text-align:center;margin-bottom:20px;
  opacity:.6;letter-spacing:.04em;
  padding:8px 12px;
  border-radius:8px;
  background:rgba(255,215,0,.07);
  border:1px solid rgba(255,215,0,.15);
}
body.light #goal-anchor-hint{
  background:rgba(200,160,0,.08);
  border-color:rgba(180,140,0,.18);
  color:#5a4000;
  opacity:1;
}
/* Indicator line showing where goal will land on timeline */
#goal-anchor-line{
  display:flex;align-items:center;gap:8px;
  margin-bottom:18px;
  font-size:.6rem;
  opacity:.55;
  letter-spacing:.04em;
}
#goal-anchor-line::before{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,215,0,.5));
}
#goal-anchor-line::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(270deg,transparent,rgba(255,215,0,.5));
}
#goal-create-btn{
  display:block;width:100%;padding:13px;
  font-family:'Share Tech Mono','Courier New',monospace;
  font-size:.82rem;letter-spacing:.1em;
  border-radius:12px;cursor:pointer;
  border:1.5px solid #FFD700;
  background:rgba(255,215,0,.12);
  color:#FFD700;
  text-align:center;
  transition:background .2s, box-shadow .2s, transform .15s;
  text-decoration:none;
}
#goal-create-btn:hover{
  background:rgba(255,215,0,.22);
  box-shadow:0 0 24px rgba(255,215,0,.3);
  transform:translateY(-1px);
}
#goal-create-btn:active{
  transform:translateY(1px);
}
body.light #goal-create-btn{
  background:rgba(255,200,0,.15);
  border-color:#c8a000;
  color:#7a5800;
}
body.light #goal-create-btn:hover{
  background:rgba(255,200,0,.28);
  box-shadow:0 0 18px rgba(200,160,0,.2);
}
#goal-form-close{
  position:absolute;top:12px;right:12px;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.15);
  color:rgba(255,255,255,.4);
  font-family:inherit;padding:3px 11px;border-radius:20px;
  cursor:pointer;font-size:.58rem;letter-spacing:.1em;
  transition:background .2s,color .2s;
}
#goal-form-close:hover{
  background:rgba(255,255,255,.12);
  color:rgba(255,255,255,.7);
}
body.light #goal-form-close{
  background:rgba(0,0,0,.04);border-color:rgba(0,0,0,.12);
  color:rgba(0,0,0,.35);
}
body.light #goal-form-close:hover{
  background:rgba(0,0,0,.09);
  color:rgba(0,0,0,.6);
}

/* ── Zoom state: tri-ticks-svg scales up ──────────────────────────────────── */
#tri-ticks-svg{
  transition:transform .75s cubic-bezier(.22,.8,.3,1);
  transform-origin:center center;
}
body.zoom-mode #tri-ticks-svg{
  transform:scale(1.5) translateY(9%);
  pointer-events:none;
}
/* Scene (doc nodes) follows the same transform so nodes stay on the lines */
body.zoom-mode #scene{
  transform:perspective(1500px) rotateX(4deg) scale(1.5) translateY(9%);
}
/* Якоря с плюсиком скрываются в zoom-mode */
body.zoom-mode .tri-anchor-group{
  display:none;

}

  top:calc(50% + 270px + 9vh);
}

}

  pointer-events:none;

}

  transition:transform .6s cubic-bezier(.22,.8,.3,1), opacity .45s;
}

.goal-square{
  position:absolute;
  bottom:18px;
  transform:translateX(-50%);
  width:10px;height:10px;
  cursor:pointer;pointer-events:all;z-index:20;
  transition:box-shadow .25s;
}
body:not(.light) .goal-square{
  background:transparent;
  border:1.5px solid #FFD700;
  box-shadow:0 0 10px rgba(255,215,0,.55);
}
body.light .goal-square{
  background:#FFD700;
  border:none;
  box-shadow:0 0 7px rgba(200,170,0,.45);
}
/* Square pulsing rings (square radius, not circular) */
.goal-square::before,.goal-square::after{
  content:'';position:absolute;
  border:1px solid rgba(255,215,0,.45);
  border-radius:2px;
  pointer-events:none;
  animation:goalRing 2.6s ease-in-out infinite;
}
.goal-square::before{
  inset:-5px;
}
.goal-square::after{
  inset:-11px;
  border-color:rgba(255,215,0,.18);
  animation-delay:.6s;
}
@keyframes goalRing{
  0%,100%{transform:scale(.82);opacity:.75}
  50%{transform:scale(1.25);opacity:.18}
}
.goal-square .goal-emoji{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-size:.7rem;line-height:1;
  pointer-events:none;
}

(function(){
  var panel = document.createElement('div');
  panel.id = 'dbg-panel';
  panel.style.cssText = 'display:none;position:fixed;top:10px;left:50%;transform:translateX(-50%);' +

    if(e.code === 'KeyD' && e.target.tagName !== 'INPUT'){
      window._dbgVisible = !window._dbgVisible;
      panel.style.display = window._dbgVisible ? 'block' : 'none';
      if(window._dbgVisible && typeof window._updateDbg === 'function') window._updateDbg();
    }
  });
  window._updateDbg = function(){
    if(!window._dbgVisible) return;
    var now = new Date();
    var realUTC = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate()));
    var presentStr = PRESENT.toISOString().slice(0,10);
    var realStr    = realUTC.toISOString().slice(0,10);
    var drift = (realUTC - PRESENT) / DAY_MS;
    var off = (typeof offset !== 'undefined') ? offset : 0;
    var lines = [
      'PRESENT (в коде): ' + presentStr,
      'UTC сейчас:       ' + realStr + (drift ? '  ⚠ дрейф ' + drift + 'д' : '  ✓'),
      'offset:           ' + off.toFixed(2) + ' дней',

// Проверяет, находится ли точка (px,py) внутри капсулы (near, far, rN, rF)
function _pointInCapsule(px, py, near, far, rN, rF) {
  var dx = far.x - near.x, dy = far.y - near.y;
  var len = Math.sqrt(dx*dx + dy*dy) || 1;
  var ax = dx/len, ay = dy/len; // единичный вектор вдоль оси
  var qx = px - near.x, qy = py - near.y;
  var t = qx*ax + qy*ay; // проекция на ось
  var perp = Math.abs(qx*(-ay) + qy*ax); // перпендикулярное расстояние
  if(t < 0) {
    return Math.sqrt(qx*qx + qy*qy) <= rN;
  } else if(t > len) {
    var ex = px - far.x, ey = py - far.y;
    return Math.sqrt(ex*ex + ey*ey) <= rF;
  } else {
    var r = rN + (rF - rN) * (t / len); // линейная интерполяция радиуса
    return perp <= r;
  }
}

// _clusterRenderLabels — подписи к заметкам внутри кластеров
// ══════════════════════════════════════════════════════════════════════════
window._clLabelGroups = {};
window._clusterRenderLabels = function(eg, docs, positions, hovDoc, activeDocId, pinnedDocId, daysToT, offset, zoneKey){
  var cfg = window.CLUSTER_CONFIG;
  if(!cfg.showLabels) return;
  // zoneKey = 'zoneId-side' e.g. '1h1d-past'
  var zoneId = zoneKey.split('-')[0];
  if(cfg.labelZones && cfg.labelZones.indexOf(zoneId) === -1) return;

  var labelG = window._clLabelGroups[zoneKey];
  if(!labelG || !labelG.parentNode){
    labelG = document.createElementNS('http://www.w3.org/2000/svg','g');
    labelG.setAttribute('pointer-events','none');
    eg.parentNode.appendChild(labelG);
    window._clLabelGroups[zoneKey] = labelG;
  }
  labelG.setAttribute('opacity', eg.getAttribute('opacity') || '1');

  var ti = 0;
  var lNodes = labelG.childNodes;
  docs.forEach(function(doc, i){
    var pos = positions[i];
    if(activeDocId === doc.id || pinnedDocId === doc.id) return;
    var isEHov = hovDoc && hovDoc.id === doc.id;
    var t = daysToT(Math.abs(doc._daysDiff - offset));
    var op = Math.max(0.22, Math.pow(1-t, 1.1) * 1.05);
    if(isEHov) op = 0;

    var rawTitle = (doc.title || '').replace(/^[\u{1F300}-\u{1FFFF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}\s]+/u,'').trim();
    if(!rawTitle) rawTitle = doc.title || '';
    var label = rawTitle.length > cfg.labelMaxChars ? rawTitle.slice(0, cfg.labelMaxChars) + '\u2026' : rawTitle;
    var sz = Math.max(cfg.labelMinSize, cfg.labelBaseSize * pos.sc);
    var offsetY = cfg.labelOffsetY * pos.sc;

    var txt;
    if(ti < lNodes.length){ txt = lNodes[ti]; }
    else {
      txt = document.createElementNS('http://www.w3.org/2000/svg','text');
      txt.setAttribute('text-anchor','middle');
      txt.setAttribute('dominant-baseline','hanging');
      txt.setAttribute('font-family','Share Tech Mono, Courier New, monospace');
      labelG.appendChild(txt);
    }
    txt.setAttribute('x', pos.x.toFixed(1));
    txt.setAttribute('y', (pos.y + offsetY).toFixed(1));
    txt.setAttribute('font-size', sz.toFixed(1));
    txt.setAttribute('opacity', op.toFixed(2));
    txt.setAttribute('fill', (typeof _isLightTheme !== 'undefined' && _isLightTheme) ? 'rgba(20,40,80,0.7)' : 'rgba(200,230,255,0.7)');
    if(txt.textContent !== label) txt.textContent = label;
    ti++;
  });
  while(labelG.childNodes.length > ti) labelG.removeChild(labelG.lastChild);
};

// Капсула — конусообразный вытянутый овал: широкий у 40д, узкий у 365д.

// Активный/pinned узел → обычный шарик поверх всего.

(function(){

  ['wheel','touchstart','touchmove','touchend'].forEach(function(ev){
    clSvg.addEventListener(ev, function(e){
      var clone = new e.constructor(e.type, e);
      _clAppEl.dispatchEvent(clone);
    }, ev === 'wheel' ? {passive:false} : {passive:true});
  });

  // mousemove/mousedown НЕ на hitEl — пробрасываем для drag-навигации
  clSvg.addEventListener('mousemove', function(e){
    if(e.target && e.target === _hitEls.past) return;

  clSvg.addEventListener('mousedown', function(e){

var _hoverClearTimer = null;
document.getElementById('app').addEventListener('mousemove', function(e){
  // nodeAtPoint обходит SVG-оверлей и проверяет шарики напрямую через getBoundingClientRect
  var found = nodeAtPoint(e.clientX, e.clientY);
  if(found){
    // Попали на шарик — мгновенно переключаем, отменяем отложенный сброс
    if(_hoverClearTimer){ clearTimeout(_hoverClearTimer); _hoverClearTimer = null; }
    // 🪲 Сбрасываем hoveredGoal если курсор перешёл на шарик минуя mouseleave goal-нода
    if(hoveredGoal){

          }
        });

    }
    if(found !== hoveredDoc){
      // Снимаем класс hovered с предыдущего шарика
      if(hoveredDoc && pool[hoveredDoc.id]){
        var _pn = pool[hoveredDoc.id]._node || pool[hoveredDoc.id].querySelector('.node');
        if(_pn) _pn.classList.remove('hovered');

        _unhoverNodeMask(hoveredDoc.id);
      }
      hoveredDoc = found;
      // Вешаем класс hovered на новый шарик (работает поверх SVG)
      var _fn = pool[found.id] && (pool[found.id]._node || pool[found.id].querySelector('.node'));
      if(_fn) _fn.classList.add('hovered');

    if(!_hoverClearTimer){

        }
      }, 80);

  if(window._drawClusters && !window._clDrawPending){ window._clDrawPending = true; requestAnimationFrame(function(){ window._clDrawPending = false; window._drawClusters(); }); }

  if(window._drawClusters && !window._clDrawPending){ window._clDrawPending = true; requestAnimationFrame(function(){ window._clDrawPending = false; window._drawClusters(); }); }

// ══════════════════════════════════════════════════════════════════════════
// GHOST DRAG: перетаскивание заметки по линии времени через поле даты
// ══════════════════════════════════════════════════════════════════════════
var _ghostState = null;

// Обратная функция: tPos → дни (интерполяция по POS_ANCHORS)
function tPosToDays(tPos){
  tPos = Math.max(0, Math.min(0.9999, tPos));
  for(var i = 0; i < POS_ANCHORS.length - 1; i++){
    var a1 = POS_ANCHORS[i], a2 = POS_ANCHORS[i+1];
    if(tPos >= a1.t && tPos <= a2.t){
      var ratio = (tPos - a1.t) / (a2.t - a1.t);
      return a1.days + ratio * (a2.days - a1.days);
    }
  }
  var last = POS_ANCHORS[POS_ANCHORS.length-1];
  var prev = POS_ANCHORS[POS_ANCHORS.length-2];
  var slope = (last.days - prev.days) / (last.t - prev.t);
  return last.days + slope * (tPos - last.t);
}

// Форматирование даты в YYYY-MM-DD
function daysToDateStr(signedDays){
  var ms = PRESENT.getTime() + signedDays * DAY_MS;
  var d = new Date(ms);
  var y = d.getUTCFullYear();
  var m = String(d.getUTCMonth()+1).padStart(2,'0');
  var dd = String(d.getUTCDate()).padStart(2,'0');
  return y+'-'+m+'-'+dd;
}

// Из экранных координат курсора → дни относительно PRESENT (дробные, без округления)
function screenToDays(clientX, clientY){
  var cx = window.innerWidth  / 2;
  var cy = window.innerHeight / 2;
  var svgX = clientX - cx;
  var svgY = clientY - cy;
  var sign = svgX >= 0 ? 1 : -1;
  var tFromY = (180 - svgY) / 485;
  var tFromX = Math.abs(svgX) / (280 * (window._triSvgScaleX || 1));
  var tPos = tFromY * 0.6 + tFromX * 0.4;
  tPos = Math.max(0, Math.min(POS_ANCHORS[POS_ANCHORS.length-1].t, tPos)); // 🪲 зажимаем до последнего якоря — 0.99 превышало max t=0.9523 и вызывало экстраполяцию за пределы шкалы
  var days = tPosToDays(tPos);
  return sign * days; // дробные дни — НЕ округляем
}

function startGhostDrag(doc, onConfirm){
  if(_ghostState) stopGhostDrag(false);

  // Сохраняем оригинальные значения для восстановления при отмене
  var origDaysDiff = doc._daysDiff;
  var origDate     = doc.date;

  // Начальная позиция заметки на экране — точно как у призрака
  var initDays = doc._daysDiff;
  if(initDays === undefined || initDays === null) initDays = 0;
  var initAbs  = Math.abs(initDays);
  var initTPos = daysToTPos(initAbs);
  var initSign = initDays >= 0 ? 1 : -1;
  var cx0 = window.innerWidth  / 2;
  var cy0 = window.innerHeight / 2;
  var initSX = cx0 + initSign * initTPos * 280 * (window._triSvgScaleX || 1);
  var initSY = cy0 + (-initTPos * 485 + 180);

  // Текущий scale заметки (зависит от удалённости от центра)
  var initT  = daysToT(initAbs);
  var initSc = Math.max(0.06, 1 - initT * 0.94);

  // Берём реальный wrap заметки и переводим его в fixed-режим
  var wrap = pool[doc.id];
  var nodeEl = wrap && (wrap._node || wrap.querySelector('.node'));

  // Сохраняем оригинальные стили чтобы восстановить после drag
  var origPosition   = wrap ? wrap.style.position   : '';
  var origLeft       = wrap ? wrap.style.left        : '';
  var origTop        = wrap ? wrap.style.top         : '';
  var origTransform  = wrap ? wrap.style.transform   : '';
  var origTransition = wrap ? wrap.style.transition  : '';
  var origZIndex     = wrap ? wrap.style.zIndex      : '';
  var origWillChange = wrap ? wrap.style.willChange  : '';
  var origNodeScale  = nodeEl ? nodeEl.style.transform : '';

  if(wrap){
    wrap.style.position   = 'fixed';
    wrap.style.left       = initSX + 'px';
    wrap.style.top        = initSY + 'px';
    wrap.style.transform  = 'translate(-50%, -50%)';
    wrap.style.transition = 'none';
    wrap.style.zIndex     = '9998';
    wrap.style.willChange = 'left, top';
  }

  // Scale: оригинальный × 1.3, без перспективных искажений
  if(nodeEl){
    nodeEl.style.transform     = 'scale(' + (initSc * 1.3).toFixed(4) + ')';
    nodeEl.style.outline       = '2.5px dashed ' + doc.color;
    nodeEl.style.outlineOffset = '3px';
    nodeEl.style.boxShadow     = '0 0 18px ' + doc.color + '55';
  }

  // Подсказка — один в один как у призрака
  var ghostHint = document.createElement('div');
  ghostHint.style.cssText = [
    'position:fixed;pointer-events:none;z-index:9999;',
    'left:50%;bottom:100px;transform:translateX(-50%);',
    'font-family:"Share Tech Mono",monospace;font-size:.6rem;letter-spacing:.07em;',
    'color:rgba(180,210,240,.5);',
    'background:rgba(3,4,8,.75);padding:4px 16px;border-radius:20px;',
  ].join('');
  ghostHint.textContent = '↕ двигай курсор · отпусти чтобы закрепить';
  document.body.appendChild(ghostHint);

  // Скрываем card-panel
  var cardPanelEl = document.getElementById('card-panel');
  if(cardPanelEl){
    cardPanelEl.style.transition = 'opacity .15s';
    cardPanelEl.style.opacity = '0';
    cardPanelEl.style.pointerEvents = 'none';
  }

  var currentDays = initDays;
  var _lastDateStr = daysToDateStr(initDays);
  var _rafId = null;
  var _pendingX = null, _pendingY = null;

  // HUD — один в один как у призрака
  function _updateHUDForGhost(days){
    var absD = Math.abs(days);
    var isPast = days < 0;
    var baseMs = PRESENT.getTime() + days * DAY_MS;
    var d = new Date(baseMs);
    var dd   = String(d.getUTCDate()).padStart(2,'0');
    var mm   = String(d.getUTCMonth()+1).padStart(2,'0');
    var yyyy = d.getUTCFullYear();
    var wd   = d.toLocaleDateString('ru-RU',{weekday:'short',timeZone:'UTC'}).replace('.','');
    var gc   = doc.color;
    zDate.classList.remove('is-present');
    zDist.classList.remove('is-present');
    zDate.textContent = dd+'.'+mm+'.'+yyyy+', '+wd;
    zDate.style.color = gc+'cc';
    zDate.style.textShadow = '0 0 18px '+gc+'66';
    if(_clockInterval){ clearInterval(_clockInterval); _clockInterval = null; }
    if(absD < 0.5){
      var hh = String(d.getUTCHours()).padStart(2,'0');
      var mi = String(d.getUTCMinutes()).padStart(2,'0');
      zDist.textContent = (isPast ? '← ' : '→ ') + hh + ':' + mi;
    } else {
      var label = distLabel(absD, isPast);
      zDist.textContent = label !== null ? label : (isPast ? '← ' : '→ ') + '0д';
    }
    zDist.style.color = gc+'88';
  }

  // Движение — один в один как moveGhostTo, но двигаем wrap а не ghost-div
  function moveGhostTo(clientX, clientY){
    var days = screenToDays(clientX, clientY);
    currentDays = days;
    var abs  = Math.abs(days);
    var tPos = daysToTPos(abs);
    var sign = days >= 0 ? 1 : -1;
    var sx = window.innerWidth/2  + sign * tPos * 280 * (window._triSvgScaleX||1);
    var sy = window.innerHeight/2 + (-tPos * 485 + 180);
    if(wrap){
      wrap.style.left = sx + 'px';
      wrap.style.top  = sy + 'px';
    }
    _lastDateStr = daysToDateStr(days);
    _updateHUDForGhost(days);
    if(typeof render === 'function') render();
  }

  function onMove(e){
    e.stopPropagation();
    _pendingX = e.clientX !== undefined ? e.clientX : (e.touches&&e.touches[0]?e.touches[0].clientX:null);
    _pendingY = e.clientY !== undefined ? e.clientY : (e.touches&&e.touches[0]?e.touches[0].clientY:null);
    if(_pendingX === null) return;
    if(_rafId) return;
    _rafId = requestAnimationFrame(function(){
      _rafId = null;
      if(_ghostState) moveGhostTo(_pendingX, _pendingY);
    });
  }

  function onMouseUp(e){
    e.preventDefault();
    e.stopPropagation();
    stopGhostDrag(true, _lastDateStr);
  }

  document.addEventListener('mousemove', onMove, true);
  document.addEventListener('mouseup', onMouseUp, {capture:true}); // 🪲 убрано once:true — removeEventListener в stopGhostDrag теперь гарантированно удаляет обработчик

  _updateHUDForGhost(initDays);

  _ghostState = {
    doc:   doc,
    wrap:  wrap,
    nodeEl: nodeEl,
    hint:  ghostHint,
    onMove: onMove,
    onMouseUp: onMouseUp,
    onConfirmCallback: onConfirm,
    cardPanel: cardPanelEl,
    // Сохранённые стили для восстановления
    origPosition:   origPosition,
    origLeft:       origLeft,
    origTop:        origTop,
    origTransform:  origTransform,
    origTransition: origTransition,
    origZIndex:     origZIndex,
    origWillChange: origWillChange,
    origNodeScale:  origNodeScale,
    origDaysDiff:   origDaysDiff,
    origDate:       origDate,
  };
}

function stopGhostDrag(confirmed, dateStr){
  if(!_ghostState) return;
  var s = _ghostState;
  _ghostState = null;

  document.removeEventListener('mousemove', s.onMove, true);
  document.removeEventListener('mouseup', s.onMouseUp, {capture:true});

  // Снимаем пунктирный контур и scale с ноды
  if(s.nodeEl){
    s.nodeEl.style.outline       = '';
    s.nodeEl.style.outlineOffset = '';
    s.nodeEl.style.boxShadow     = '';
    s.nodeEl.style.transform     = s.origNodeScale || '';
  }

  if(s.wrap){
    if(confirmed && dateStr && s.doc){
      // Обновляем _daysDiff и date сразу (синхронизируем оба поля)
      var newMs = new Date(dateStr + 'T00:00:00Z').getTime();
      s.doc._daysDiff = (newMs - PRESENT.getTime()) / DAY_MS;
      s.doc.date      = dateStr;
      // 🪲 Сохраняем изменение даты в localStorage и обновляем _searchHay
      _saveDocEdit(s.doc.id, s.doc.title, s.doc.sub, s.doc.content, dateStr, s.doc.emoji);
      var _ghostContentTxt = s.doc.content.replace(/<[^>]*>/g, ' ').replace(/\s+/g,' ').trim();
      s.doc._searchHay = (s.doc.title+' '+_ghostContentTxt+' '+s.doc.tags.join(' ')+' '+s.doc.sub).toLowerCase();

      // Вычисляем transform для новой позиции и сразу вписываем его —
      // тогда при смене position:fixed → '' элемент встаёт на правильное место
      var newAbs  = Math.abs(s.doc._daysDiff);
      var newSign = s.doc._daysDiff >= 0 ? 1 : -1;
      var newT    = daysToT(newAbs);
      var newTPos = daysToTPos(newAbs);
      var newSc   = Math.max(0.06, 1 - newT * 0.94);
      var newRailX = newSign * newTPos * 280 * (window._triSvgScaleX || 1);
      var newRailY = -newTPos * 485 + 180;

      s.wrap.style.transition = 'none';
      s.wrap.style.position   = s.origPosition;
      s.wrap.style.left       = s.origLeft;
      s.wrap.style.top        = s.origTop;
      s.wrap.style.transform  =
        'translateX(calc(-50% + ' + newRailX.toFixed(1) + 'px)) ' +
        'translateY(calc(-50% + ' + newRailY.toFixed(1) + 'px)) ' +
        'scale(' + newSc.toFixed(4) + ')';
      s.wrap.style.zIndex     = s.origZIndex;
      s.wrap.style.willChange = s.origWillChange;
      // Через кадр восстанавливаем transition
      requestAnimationFrame(function(){
        if(s.wrap) s.wrap.style.transition = s.origTransition;
      });
    } else {
      // Отмена — восстанавливаем позицию заметки на исходную
      if(s.doc){
        s.doc._daysDiff = s.origDaysDiff;
        s.doc.date      = s.origDate;
      }
      // Восстанавливаем поле даты в карточке
      var _dateEl = document.getElementById('edit-date');
      if(_dateEl && s.origDate) _dateEl.value = s.origDate;
      s.wrap.style.position   = s.origPosition;
      s.wrap.style.left       = s.origLeft;
      s.wrap.style.top        = s.origTop;
      s.wrap.style.transform  = s.origTransform;
      s.wrap.style.transition = s.origTransition;
      s.wrap.style.zIndex     = s.origZIndex;
      s.wrap.style.willChange = s.origWillChange;
    }
  }

  // Убираем подсказку
  if(s.hint){
    s.hint.style.transition = 'opacity .2s';
    s.hint.style.opacity = '0';
    setTimeout(function(){ if(s.hint.parentNode) s.hint.parentNode.removeChild(s.hint); }, 250);
  }

  // Возвращаем card-panel с классом show чтобы кнопки внутри были кликабельны
  if(s.cardPanel){
    s.cardPanel.style.transition = 'opacity .2s';
    s.cardPanel.style.opacity = '';
    s.cardPanel.style.pointerEvents = '';
    s.cardPanel.className = 'show';
    setTimeout(function(){ if(s.cardPanel) s.cardPanel.style.transition = ''; }, 250);
  }

  // Восстанавливаем HUD
  if(typeof updateZone === 'function') updateZone();

  if(confirmed && dateStr && s.onConfirmCallback){
    s.onConfirmCallback(dateStr);
  }
}

        if(wrap){ wrap.innerHTML = nodeHTML(doc, activeDocId === doc.id); wrap._node = wrap.querySelector('.node'); }
        if(typeof render === 'function') render();
      });
    });

  setTimeout(function(){ var f = cardBox.querySelector('#edit-content'); if(f) f.focus(); }, 60);

  // Устанавливаем значение date-поля через JS — innerHTML не умеет правильно

  var dateInput = cardBox.querySelector('#edit-date');

};

// Build a removable tag badge for the edit card
function _makeEditTagBadge(tag, doc){
  var side = _getTagSide(tag);
  var badge = document.createElement('span');
  badge.className = 'c-etag side-' + side;
  badge.dataset.tag = tag;

  var txt = document.createElement('span');
  txt.textContent = tag.replace(/^#/,'');
  badge.appendChild(txt);

  var x = document.createElement('span');
  x.className = 'c-etag-x';
  x.textContent = '×';
  badge.appendChild(x);

  x.addEventListener('click', function(e){
    e.stopPropagation();
    _removeTagFromEditCard(tag, doc);
  });
  badge.addEventListener('click', function(e){
    if(e.target === x) return;
    _removeTagFromEditCard(tag, doc);
  });
  return badge;
}

// Remove a tag from the edit card
function _removeTagFromEditCard(tag, doc){
  var idx = doc.tags.indexOf(tag);
  if(idx !== -1) doc.tags.splice(idx, 1);
  // Update badge bar
  var bar = document.getElementById('edit-tag-bar');
  if(bar){
    var b = bar.querySelector('[data-tag="'+tag.replace(/"/g,'\\"')+'"]');
    if(b) bar.removeChild(b);
  }
  _syncEditTagHighlights(doc);
}

// Add tag to edit card
window._addTagToEditCard = function(tag, doc){
  if(!doc) return;
  if(doc.tags.indexOf(tag) !== -1){
    // Already present — remove it (toggle)
    _removeTagFromEditCard(tag, doc);
    return;
  }
  doc.tags.push(tag);
  var bar = document.getElementById('edit-tag-bar');
  if(bar) bar.appendChild(_makeEditTagBadge(tag, doc));
  _syncEditTagHighlights(doc);
};

// Get tag side from the sidebar DOM (left or right column)
function _getTagSide(tag){
  var leftEl = document.getElementById('hashtags-left');
  if(leftEl){ // 🪲
    var all = leftEl.querySelectorAll('[data-tag]');
    for(var i=0;i<all.length;i++){
      if(all[i].dataset.tag === tag) return 'left';
    }
  }
  return 'right';
}

// Mark/unmark on-card class on sidebar tags
function _syncEditTagHighlights(doc){
  var leftEl = document.getElementById('hashtags-left');
  var rightEl = document.getElementById('hashtags-right');
  if(!leftEl || !rightEl) return;
  var tags = doc ? doc.tags : [];
  leftEl.querySelectorAll('.htag').forEach(function(b){
    b.classList.toggle('on-card', tags.indexOf(b.dataset.tag) !== -1);
  });
  rightEl.querySelectorAll('.htag').forEach(function(b){
    b.classList.toggle('on-card', tags.indexOf(b.dataset.tag) !== -1);
  });
}

// Exit edit mode cleanup
function _exitEditMode(saved){
  document.body.classList.remove('card-editing');

  // Если выходим без сохранения — восстанавливаем дату, позицию, цвет и эмодзи
  if(!saved && window._editingDocId){
    var _doc = DOCS.find(function(d){ return d.id === window._editingDocId; });
    if(_doc && window._editOrigDate !== undefined){
      _doc.date      = window._editOrigDate;
      _doc._daysDiff = window._editOrigDaysDiff;
    }
    if(_doc && window._editOrigColor !== undefined){ _doc.color = window._editOrigColor; } // 🪲
    if(_doc && window._editOrigEmoji !== undefined){ _doc.emoji = window._editOrigEmoji; } // 🪲
    if(_doc && window._editOrigTags  !== undefined){ // 🪲
      var _tagsChanged = JSON.stringify(_doc.tags) !== JSON.stringify(window._editOrigTags);
      _doc.tags = window._editOrigTags;
      var _rTxt = _doc.content.replace(/<[^>]*>/g, ' ').replace(/\s+/g,' ').trim();
      _doc._searchHay = (_doc.title+' '+_rTxt+' '+_doc.tags.join(' ')+' '+_doc.sub).toLowerCase();
      if(_tagsChanged && typeof window.refreshHashtags === 'function') window.refreshHashtags(); // 🪲 пересчитываем tagMap после отката тегов
    }
  }
  window._editOrigDate     = undefined;
  window._editOrigDaysDiff = undefined;
  window._editOrigColor    = undefined; // 🪲
  window._editOrigEmoji    = undefined; // 🪲
  window._editOrigTags     = undefined; // 🪲

  window._editingDocId = null;
  // Clear on-card highlights
  document.querySelectorAll('.htag.on-card').forEach(function(b){ b.classList.remove('on-card'); });
  // Close emoji picker if open
  var overlay = document.getElementById('emoji-picker-overlay');
  if(overlay) overlay.classList.remove('show');
}

function openEmojiPicker(doc, onPick){
  var overlay = document.getElementById('emoji-picker-overlay');
  var grid    = document.getElementById('emoji-picker-grid');
  var search  = document.getElementById('emoji-picker-search');
  if(!overlay || !grid || !search) return;

  // Pre-split all categories once using Intl.Segmenter if available
  var _hasSegmenter = typeof Intl !== 'undefined' && typeof Intl.Segmenter === 'function';
  function splitEmojis(str){
    if(_hasSegmenter){
      return Array.from(new Intl.Segmenter().segment(str), function(s){ return s.segment; })
                  .filter(function(s){ return s.trim().length > 0; });
    }
    // Fallback: regex for emoji sequences (covers most cases)
    var matches = str.match(/\p{Emoji_Presentation}(?:\uFE0F)?(?:\u200D\p{Emoji_Presentation}(?:\uFE0F)?)*|\p{Emoji}\uFE0F/gu);
    return matches || Array.from(str).filter(function(c){ return c.trim(); });
  }

  search.value = '';

  function buildGrid(filter){
    grid.innerHTML = '';
    EMOJI_CATEGORIES.forEach(function(cat){
      var emojis = splitEmojis(cat.emojis);
      if(!emojis.length) return;

      // When filtering: skip category label, show all emojis (flat)
      // When not filtering: show category label + emojis
      if(!filter){
        var catLbl = document.createElement('div');
        catLbl.className = 'ep-cat';
        catLbl.textContent = cat.label;
        grid.appendChild(catLbl);
      }

      emojis.forEach(function(em){
        if(filter && !em.toLowerCase().includes(filter)) return; // 🪲 фильтруем эмодзи по запросу
        var btn = document.createElement('button');
        btn.className = 'ep-btn';
        btn.textContent = em;
        btn.addEventListener('click', function(e){
          e.stopPropagation();
          onPick(em);
          overlay.classList.remove('show');
        });
        grid.appendChild(btn);
      });
    });
  }

  buildGrid('');

  search.oninput = function(){
    buildGrid(search.value.trim().toLowerCase());
  };

  overlay.classList.add('show');
  grid.scrollTop = 0;
  setTimeout(function(){ search.focus(); }, 120);

  // Close on overlay background click
  overlay.onclick = function(e){
    if(e.target === overlay) overlay.classList.remove('show');
  };
}

    sw.title = c;
    sw.addEventListener('click', function(e){
      e.stopPropagation();
      onPick(c);
      overlay.classList.remove('show');
    });
    grid.appendChild(sw);
  });

  overlay.classList.add('show');

  overlay.onclick = function(e){
    if(e.target === overlay) overlay.classList.remove('show');
  };
  if(closeBtn){
    closeBtn.onclick = function(){ overlay.classList.remove('show'); };
  }
}

window.saveDocEdit = function(docId){
  var doc = DOCS.find(function(d){ return d.id === docId; });
  if(!doc) return;

  // Читаем ВСЕ значения полей ДО любых изменений DOM
  var titleEl   = cardBox.querySelector('#edit-title');
  var subEl     = cardBox.querySelector('#edit-sub');
  var contentEl = cardBox.querySelector('#edit-content');
  var dateEl    = cardBox.querySelector('#edit-date');
  var emojiBtn  = cardBox.querySelector('#edit-emoji-btn');
  if(!titleEl || !subEl || !contentEl) return;

  var newTitle      = titleEl.value.trim(); // 🪲 не фолбэчим — пользователь может намеренно очистить поле
  var newSub        = subEl.value.trim();
  var newContentHTML= contentEl.innerHTML.trim();
  var newContentTxt = contentEl.innerText.trim();
  // dateEl.value для input[type=date] всегда в формате YYYY-MM-DD или пустая строка
  var newDate       = (dateEl && dateEl.value && dateEl.value.length === 10)
                        ? dateEl.value
                        : doc.date;
  var newEmoji      = (emojiBtn && emojiBtn.textContent.trim()) || doc.emoji;


  // Update in-memory
  doc._prevDaysDiff = doc._daysDiff; // сохраняем старую позицию для определения анимации
  doc.title      = newTitle;
  doc.sub        = newSub;
  doc.content    = newContentHTML;
  doc._contentTxt= newContentTxt;
  doc.date       = newDate;
  doc.emoji      = newEmoji;
  doc._daysDiff  = (new Date(newDate+'T00:00:00Z') - PRESENT) / DAY_MS;

  // Update search cache
  doc._searchHay = (doc.title+' '+newContentTxt+' '+doc.tags.join(' ')+' '+doc.sub).toLowerCase();

  // Persist
  _saveDocEdit(docId, newTitle, newSub, newContentHTML, newDate, newEmoji);

  // Пересчитываем tagMap — теги могли измениться в режиме редактирования 🪲
  if(typeof window.refreshHashtags === 'function') window.refreshHashtags();

  // Update node emoji in scene immediately — НЕ перестраиваем wrap.innerHTML здесь,
  // чтобы не сбрасывать CSS transition. render() ниже обновит всё сам.

  var wrap = pool[doc.id];
  var _prevDaysDiff = doc._prevDaysDiff !== undefined ? doc._prevDaysDiff : null;
  var dateChanged = (_prevDaysDiff !== null && Math.abs(doc._daysDiff - _prevDaysDiff) > 0.1);

  // Если дата изменилась — шарик должен плавно переехать.
  // render() перезаписывает transition каждый кадр (строка ~3258), поэтому
  // вешаем флаг _animatingMove на wrap — render() проверяет его и использует
  // длинный transition вместо стандартного короткого.
  if(wrap && dateChanged){
    // Снять transition → шарик «прилипает» к текущей CSS-позиции (старая дата)
    wrap.style.transition = 'none';
    void wrap.offsetWidth; // принудительный reflow
    wrap._animatingMove = true;
    setTimeout(function(){ if(wrap) wrap._animatingMove = false; }, 1100);
  }

  // Выходим из режима редактирования (saved=true — не откатываем дату)
  _exitEditMode(true);

  // В следующем кадре: открываем карточку, устанавливаем transition, двигаем шарик
  requestAnimationFrame(function(){
    openCard(doc); // вызывает render() внутри — шарик уже едет с длинным transition
    if(dateChanged){
      // Непрерывно обновляем линии связи пока шарик едет (~1 сек)
      var _t0 = performance.now();
      function _linkLoop(){
        if(typeof drawLinkLines === 'function') drawLinkLines();
        if(performance.now() - _t0 < 1100) requestAnimationFrame(_linkLoop);
      }
      requestAnimationFrame(_linkLoop);
    }
  });

  // Flash save confirmation
  setTimeout(function(){
    var closeBtn = cardBox.querySelector('#card-close');
    if(closeBtn){ var orig = closeBtn.textContent; closeBtn.textContent = '✓'; setTimeout(function(){ if(closeBtn) closeBtn.textContent = orig; }, 900); }
  }, 50);
};

cardPanel.addEventListener('mousemove', function(e){
  var overInteractive = false;
  // Проверяем заметки
  var wraps = (typeof _wrapsCache !== 'undefined') ? _wrapsCache : scene.querySelectorAll('.doc-wrap');
  for(var i = 0; i < wraps.length; i++){
    var w = wraps[i];
    if(w.style.visibility === 'hidden' || parseFloat(w.style.opacity !== '' ? w.style.opacity : '1') < 0.05) continue;
    var nd = w._node || w.querySelector('.node');
    if(!nd) continue;
    var nr = nd.getBoundingClientRect();
    if(e.clientX >= nr.left && e.clientX <= nr.right && e.clientY >= nr.top && e.clientY <= nr.bottom){
      overInteractive = true; break;
    }
  }
  // Проверяем цели
  if(!overInteractive && goalAtPoint(e.clientX, e.clientY)) overInteractive = true;
  cardPanel.style.cursor = overInteractive ? 'pointer' : '';
});

// ── Goal system ───────────────────────────────────────────────────────────────
var goalOverlay = document.getElementById('goal-overlay');
var goalAnchorHint = document.getElementById('goal-anchor-hint');
var goalFormClose = document.getElementById('goal-form-close');
var goalCreateBtn = document.getElementById('goal-create-btn');

// State for currently pending goal creation
var _pendingGoal = null; // {side, days, label}
window._closeGoalFormSeq = 0; // 🪲 счётчик для защиты от гонки close/reopen
window._openGoalFormSeq  = 0; // 🪲🪲 версия при открытии — close валиден только если совпадает

// Goals array: {id, days, side, createdAt(ms)}
var _goals = [];

// Triangle spring-open animation state
var _zoomSpringTimer = null;
var _triOriginalPoints = null; // store original R_END / L_END for reset

function openGoalForm(side, days, label){
  window._closeGoalFormSeq++; // 🪲🪲 инвалидируем все pending close-таймеры этого открытия
  window._openGoalFormSeq = window._closeGoalFormSeq; // 🪲🪲 фиксируем версию открытия
  _pendingGoal = {side: side, days: days, label: label};

  // Update hint text
  var sign = days > 0 ? '+' : '−';
  var absLabel = label;
  goalAnchorHint.textContent = sign + absLabel + ' от настоящего момента';

  // Also update anchor line label
  var anchorLine = document.getElementById('goal-anchor-line');
  if(anchorLine){
    var dir = days > 0 ? 'будущее' : 'прошлое';
    anchorLine.textContent = sign + absLabel + ' · ' + dir;
  }

  // ── Spring animation: open triangle by +10° then settle ───────────────────
  // We animate the SVG lines' endpoints outward (overshoot) then back to +10°
  // by manipulating the CSS transform of #tri-ticks-svg with a spring keyframe.
  var svg = document.getElementById('tri-ticks-svg');
  var sceneEl = document.getElementById('scene');
  if(svg){
    // Remove any pending spring
    if(_zoomSpringTimer){ clearTimeout(_zoomSpringTimer); _zoomSpringTimer = null; }
    svg.style.transition = 'none';
    if(sceneEl) sceneEl.style.transition = 'none';
    // Inject a spring keyframe animation via style element
    var springId = 'zoom-spring-kf';
    var existing = document.getElementById(springId);
    if(existing) existing.parentNode.removeChild(existing);
    var kfStyle = document.createElement('style');
    kfStyle.id = springId;
    kfStyle.textContent = [
      '@keyframes zoomSpring{',
      '  0%   {transform:scale(1)         translateY(0%)}',
      '  35%  {transform:scale(1.55)      translateY(9.5%)}',
      '  55%  {transform:scale(1.48)      translateY(8.8%)}',
      '  72%  {transform:scale(1.52)      translateY(9.2%)}',
      '  85%  {transform:scale(1.495)     translateY(9%)}',
      '  100% {transform:scale(1.5)       translateY(9%)}',
      '}',
      '@keyframes zoomSpringScene{',
      '  0%   {transform:perspective(1500px) rotateX(4deg) scale(1)         translateY(0%)}',
      '  35%  {transform:perspective(1500px) rotateX(4deg) scale(1.55)      translateY(9.5%)}',
      '  55%  {transform:perspective(1500px) rotateX(4deg) scale(1.48)      translateY(8.8%)}',
      '  72%  {transform:perspective(1500px) rotateX(4deg) scale(1.52)      translateY(9.2%)}',
      '  85%  {transform:perspective(1500px) rotateX(4deg) scale(1.495)     translateY(9%)}',
      '  100% {transform:perspective(1500px) rotateX(4deg) scale(1.5)       translateY(9%)}',
      '}'
    ].join('');
    document.head.appendChild(kfStyle);
    svg.style.animation = 'zoomSpring 0.72s cubic-bezier(.22,.8,.3,1) forwards';
    if(sceneEl) sceneEl.style.animation = 'zoomSpringScene 0.72s cubic-bezier(.22,.8,.3,1) forwards';
    // Звёздочка больше не двигается — SVG не масштабируется через CSS

    // ── Физическое расхождение линий: анимируем только концы полигонов лент ─────
    // TIP в X=0, поэтому умножение endX*sX симметрично раздвигает концы,
    // не трогая вершину, якоря и засечки.
    if(window._triAngleAnimRaf){ cancelAnimationFrame(window._triAngleAnimRaf); }
    var _angStart = performance.now();
    var _angFrom  = window._triSvgScaleX || 1;
    var _angTo    = 1.732;
    var _angOver  = 1.85; // overshoot
    var _angDur   = 680;
    function _animAngleOpen(now){
      var p = Math.min((now - _angStart) / _angDur, 1);
      var s, pp; // 🪲 объединены два var pp в одно объявление — устранён hoisting-дефект
      if(p < 0.5){
        pp = p / 0.5;
        s = _angFrom + (_angOver - _angFrom) * (1 - Math.pow(1-pp, 2));
      } else {
        pp = (p - 0.5) / 0.5;
        s = _angOver + (_angTo - _angOver) * (1 - Math.pow(1-pp, 3));
      }
      window._triSvgScaleX = s;
      // Двигаем только концы лент — якоря и засечки остаются нетронутыми
      if(window._updateRibbonPoints) window._updateRibbonPoints(s);
      render();
      if(p < 1){ window._triAngleAnimRaf = requestAnimationFrame(_animAngleOpen); }
      else {
        window._triAngleAnimRaf = null; window._triSvgScaleX = _angTo;
        // Force link-lines redraw after zoom-in completes
        _linkLinesForceUntil = performance.now() + 400;
      }
    }
    window._triAngleAnimRaf = requestAnimationFrame(_animAngleOpen);
  } // end if(svg)

  // Activate zoom mode (slides HUD out)
  document.body.classList.add('zoom-mode');
  _isZoomMode = true;
  // Инвалидируем кэш позиции звёздочки — она смещается в zoom-mode
  if(typeof _updateStaticRects === 'function') setTimeout(_updateStaticRects, 800);
  if(typeof _anchorRect !== 'undefined') _anchorRect = null; // 🪲 якорь уезжает вниз с #tl-bar при zoom-mode

  // Show overlay (form slides up from bottom)
  // Slight delay so the zoom happens first
  setTimeout(function(){
    goalOverlay.classList.add('show');
  }, 180);
}

window.closeGoalForm = function(){
  _pendingGoal = null;
  var _closeId = window._openGoalFormSeq; // 🪲🪲 читаем версию последнего открытия
  window._closeGoalFormSeq++; // 🪲🪲 следующее open получит новый seq — инвалидирует нас

  // Hide form first — только если форма не была переоткрыта синхронно
  // (openGoalForm инкрементирует _closeGoalFormSeq и пишет _openGoalFormSeq,
  //  так что после reopen _openGoalFormSeq != _closeId) 🪲🪲
  if(window._openGoalFormSeq === _closeId){
    goalOverlay.classList.remove('show');
  }

  // Then un-zoom triangle after form fade-out
  setTimeout(function(){
    if(window._openGoalFormSeq !== _closeId) return; // 🪲🪲 форма уже переоткрыта — отменяем
    document.body.classList.remove('zoom-mode');
    _isZoomMode = false;
    // Инвалидируем кэш позиции звёздочки — она возвращается на место
    if(typeof _updateStaticRects === 'function') setTimeout(_updateStaticRects, 800);
    if(typeof _anchorRect !== 'undefined') _anchorRect = null; // 🪲 якорь возвращается на место — инвалидируем кэш
    // Reset animation on svg and scene
    var svg = document.getElementById('tri-ticks-svg');
    var sceneEl = document.getElementById('scene');
    if(svg){
      svg.style.animation = '';
      svg.style.transition = 'transform .75s cubic-bezier(.22,.8,.3,1)';
    }
    if(sceneEl){
      sceneEl.style.animation = '';
      sceneEl.style.transition = 'transform .75s cubic-bezier(.22,.8,.3,1)';
    }
    // Remove spring keyframes
    var kf = document.getElementById('zoom-spring-kf');
    if(kf) kf.parentNode.removeChild(kf);

    // Анимируем угол обратно к 1 — только концы полигонов лент
    if(window._triAngleAnimRaf){ cancelAnimationFrame(window._triAngleAnimRaf); }
    var _clStart = performance.now();
    var _clFrom  = window._triSvgScaleX || 1; // 🪲 читаем ПОСЛЕ отмены RAF — значение актуальное
    var _clDur   = 500;
    function _animAngleClose(now){
      var p = Math.min((now - _clStart) / _clDur, 1);
      var e = 1 - Math.pow(1-p, 3);
      var s = _clFrom + (1 - _clFrom) * e;
      window._triSvgScaleX = s;
      if(window._updateRibbonPoints) window._updateRibbonPoints(s);
      render();
      if(p < 1){ window._triAngleAnimRaf = requestAnimationFrame(_animAngleClose); }
      else {
        window._triAngleAnimRaf = null; window._triSvgScaleX = 1;
        // Force link-lines redraw after zoom-out completes
        _linkLinesForceUntil = performance.now() + 400;
      }
    }
    window._triAngleAnimRaf = requestAnimationFrame(_animAngleClose);
  }, 350);
};

window.createGoal = function(){

  window.closeGoalForm();

};
